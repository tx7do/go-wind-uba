syntax = "proto3";

package admin.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

import "pagination/v1/pagination.proto";
import "uba/service/v1/application.proto";

// 应用服务
service ApplicationService {
  // 获取应用列表
  rpc List (pagination.PagingRequest) returns (uba.service.v1.ListApplicationResponse) {
    option (google.api.http) = {
      get: "/admin/v1/apps"
    };
  }

  // 获取应用数据
  rpc Get (uba.service.v1.GetApplicationRequest) returns (uba.service.v1.Application) {
    option (google.api.http) = {
      get: "/admin/v1/apps/{id}"
    };
  }

  // 创建应用
  rpc Create (uba.service.v1.CreateApplicationRequest) returns (uba.service.v1.Application) {
    option (google.api.http) = {
      post: "/admin/v1/apps"
      body: "data"
    };
  }

  // 更新应用
  rpc Update (uba.service.v1.UpdateApplicationRequest) returns (uba.service.v1.Application) {
    option (google.api.http) = {
      put: "/admin/v1/apps/{id}"
      body: "data"
    };
  }

  // 删除应用
  rpc Delete (uba.service.v1.DeleteApplicationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/admin/v1/apps/{id}"
    };
  }
}
