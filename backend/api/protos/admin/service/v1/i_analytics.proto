syntax = "proto3";

package admin.service.v1;

import "google/api/annotations.proto";

import "uba/service/v1/analytics.proto";

// 数据分析服务（admin HTTP 网关，转发至 core gRPC）
service AnalyticsService {
  // 事件量趋势
  rpc EventTrend(uba.service.v1.EventTrendRequest) returns (uba.service.v1.EventTrendResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/event-trend"
      body: "*"
    };
  }

  // 漏斗分析
  rpc Funnel(uba.service.v1.FunnelRequest) returns (uba.service.v1.FunnelResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/funnel"
      body: "*"
    };
  }

  // 留存分析
  rpc Retention(uba.service.v1.RetentionRequest) returns (uba.service.v1.RetentionResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/retention"
      body: "*"
    };
  }

  // 维度分组聚合
  rpc GroupBy(uba.service.v1.GroupByRequest) returns (uba.service.v1.GroupByResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/group-by"
      body: "*"
    };
  }

  // 活跃用户
  rpc ActiveUsers(uba.service.v1.ActiveUsersRequest) returns (uba.service.v1.ActiveUsersResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/active-users"
      body: "*"
    };
  }

  // 归因分析
  rpc Attribution(uba.service.v1.AttributionRequest) returns (uba.service.v1.AttributionResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/attribution"
      body: "*"
    };
  }

  // 分布分析
  rpc Distribution(uba.service.v1.DistributionRequest) returns (uba.service.v1.DistributionResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/distribution"
      body: "*"
    };
  }

  // 行为序列
  rpc BehaviorSequence(uba.service.v1.BehaviorSequenceRequest) returns (uba.service.v1.BehaviorSequenceResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/behavior-sequence"
      body: "*"
    };
  }

  // 用户分群/圈选
  rpc Segmentation(uba.service.v1.SegmentationRequest) returns (uba.service.v1.SegmentationResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/segmentation"
      body: "*"
    };
  }

  // 点击热力图
  rpc Click(uba.service.v1.ClickRequest) returns (uba.service.v1.ClickResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/click"
      body: "*"
    };
  }
}
