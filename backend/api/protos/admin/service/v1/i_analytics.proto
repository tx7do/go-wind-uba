syntax = "proto3";

package admin.service.v1;

import "google/api/annotations.proto";

import "uba/service/v1/analytics.proto";

// 数据分析服务（admin HTTP 网关，转发至 core gRPC）
service AnalyticsService {
  // 事件量趋势
  rpc EventTrend(uba.service.v1.EventTrendRequest) returns (uba.service.v1.EventTrendResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/event-trend"
      body: "*"
    };
  }

  // 漏斗分析
  rpc Funnel(uba.service.v1.FunnelRequest) returns (uba.service.v1.FunnelResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/funnel"
      body: "*"
    };
  }

  // 留存分析
  rpc Retention(uba.service.v1.RetentionRequest) returns (uba.service.v1.RetentionResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/retention"
      body: "*"
    };
  }

  // 维度分组聚合
  rpc GroupBy(uba.service.v1.GroupByRequest) returns (uba.service.v1.GroupByResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/group-by"
      body: "*"
    };
  }

  // 活跃用户
  rpc ActiveUsers(uba.service.v1.ActiveUsersRequest) returns (uba.service.v1.ActiveUsersResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/active-users"
      body: "*"
    };
  }

  // 归因分析
  rpc Attribution(uba.service.v1.AttributionRequest) returns (uba.service.v1.AttributionResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/attribution"
      body: "*"
    };
  }

  // 分布分析
  rpc Distribution(uba.service.v1.DistributionRequest) returns (uba.service.v1.DistributionResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/distribution"
      body: "*"
    };
  }

  // 行为序列
  rpc BehaviorSequence(uba.service.v1.BehaviorSequenceRequest) returns (uba.service.v1.BehaviorSequenceResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/behavior-sequence"
      body: "*"
    };
  }

  // 用户分群/圈选
  rpc Segmentation(uba.service.v1.SegmentationRequest) returns (uba.service.v1.SegmentationResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/segmentation"
      body: "*"
    };
  }

  // 点击热力图
  rpc Click(uba.service.v1.ClickRequest) returns (uba.service.v1.ClickResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/click"
      body: "*"
    };
  }

  // 用户生命周期
  rpc Lifecycle(uba.service.v1.LifecycleRequest) returns (uba.service.v1.LifecycleResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/lifecycle"
      body: "*"
    };
  }

  // 流失与回流
  rpc Churn(uba.service.v1.ChurnRequest) returns (uba.service.v1.ChurnResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/churn"
      body: "*"
    };
  }

  // 间隔时间分析
  rpc Interval(uba.service.v1.IntervalRequest) returns (uba.service.v1.IntervalResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/interval"
      body: "*"
    };
  }

  // 矩阵/象限分析
  rpc Matrix(uba.service.v1.MatrixRequest) returns (uba.service.v1.MatrixResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/matrix"
      body: "*"
    };
  }

  // 付费/营收分析
  rpc Revenue(uba.service.v1.RevenueRequest) returns (uba.service.v1.RevenueResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/revenue"
      body: "*"
    };
  }

  // 会话分析
  rpc SessionAnalysis(uba.service.v1.SessionAnalysisRequest) returns (uba.service.v1.SessionAnalysisResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/session-analysis"
      body: "*"
    };
  }

  // 同比环比/异常检测
  rpc Anomaly(uba.service.v1.AnomalyRequest) returns (uba.service.v1.AnomalyResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/anomaly"
      body: "*"
    };
  }

  // 新老用户对比
  rpc NewVsOld(uba.service.v1.NewVsOldRequest) returns (uba.service.v1.NewVsOldResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/new-vs-old"
      body: "*"
    };
  }

  // 热门转化路径
  rpc PathSankey(uba.service.v1.PathSankeyRequest) returns (uba.service.v1.PathSankeyResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/path-sankey"
      body: "*"
    };
  }

  // 关卡/数值平衡分析
  rpc LevelAnalysis(uba.service.v1.LevelAnalysisRequest) returns (uba.service.v1.LevelAnalysisResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/level-analysis"
      body: "*"
    };
  }

  // 鲸鱼用户/付费分层
  rpc WhaleTier(uba.service.v1.WhaleTierRequest) returns (uba.service.v1.WhaleTierResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/whale-tier"
      body: "*"
    };
  }

  // 历史生命周期价值 LTV
  rpc LTV(uba.service.v1.LTVRequest) returns (uba.service.v1.LTVResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/ltv"
      body: "*"
    };
  }

  // 滚服留存
  rpc ServerRetention(uba.service.v1.ServerRetentionRequest) returns (uba.service.v1.ServerRetentionResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/server-retention"
      body: "*"
    };
  }

  // 同时在线 PCU/ACU
  rpc OnlineStats(uba.service.v1.OnlineStatsRequest) returns (uba.service.v1.OnlineStatsResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/online-stats"
      body: "*"
    };
  }

  // 经济系统/代币流向
  rpc Economy(uba.service.v1.EconomyRequest) returns (uba.service.v1.EconomyResponse) {
    option (google.api.http) = {
      post: "/admin/v1/analytics/economy"
      body: "*"
    };
  }
}
