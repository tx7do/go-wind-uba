syntax = "proto3";

package collector.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

import "uba/service/v1/report.proto";

// 上报数据服务
service ReportService {
  // 提交事件（单条/批量）
  rpc PostReport(uba.service.v1.PostReportRequest) returns (uba.service.v1.PostReportResponse) {
    option (google.api.http) = {
      post: "/uba/v1/report"
      body: "*"
    };
  }

  // 健康检查
  rpc HealthCheck(google.protobuf.Empty) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get: "/uba/v1/health"
    };
  }
}

message HealthCheckResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;

    OK = 1;         // 正常
    DEGRADED = 2;   // 降级
    DOWN = 3;       // 不可用
  }

  Status status = 1;
  int64 timestamp = 2;
}
