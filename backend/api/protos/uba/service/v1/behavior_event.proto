syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "tagger/tagger.proto";

import "uba/service/v1/common.proto";

// 行为事件服务
service BehaviorEventService {
  // 创建行为事件
  rpc Create (BehaviorEvent) returns (google.protobuf.Empty) {}
}

// 行为事件（对应 events_fact 表）
message BehaviorEvent {
  // 主键 & 路由
  // @gotags: ch:"event_id"
  string event_id = 1 [
    json_name = "eventId",
    (tagger.tags) = "graphql:\"withNewTags,optional\"",
    (gnostic.openapi.v3.property) = {description: "事件ID，建议使用 UUID，作为事件的唯一标识，同时也可用于路由和去重"}
  ]; // 事件ID，建议使用 UUID，作为事件的唯一标识，同时也可用于路由和去重
  uint32 tenant_id = 2 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID，事件所属的租户，用于多租户隔离"}
  ]; // 租户ID，事件所属的租户，用于多租户隔离

  // 主体：Who
  string user_id = 3 [
    json_name = "userId",
    (gnostic.openapi.v3.property) = {description: "用户ID，事件的主体，可以是用户、设备、账号等，具体含义由业务定义"}
  ]; // 用户ID，事件的主体，可以是用户、设备、账号等，具体含义由业务定义
  string device_id = 4 [
    json_name = "deviceId",
    (gnostic.openapi.v3.property) = {description: ""}
  ]; // 设备ID，事件发生时使用的设备标识，可以用于分析设备相关的行为特征
  string account_id = 5 [
    json_name = "accountId",
    (gnostic.openapi.v3.property) = {description: "账号ID，事件发生时使用的账号标识，可以用于分析账号相关的行为特征"}
  ]; // 账号ID，事件发生时使用的账号标识，可以用于分析账号相关的行为特征
  string global_user_id = 6 [
    json_name = "globalUserId",
    (gnostic.openapi.v3.property) = {description: "全局用户ID，结合 user_id、device_id、account_id 等多维度标识，通过算法生成的全局唯一用户标识，可以用于跨设备、跨账号的用户行为分析"}
  ]; // 全局用户ID，结合 user_id、device_id、account_id 等多维度标识，通过算法生成的全局唯一用户标识，可以用于跨设备、跨账号的用户行为分析

  // 时间
  google.protobuf.Timestamp event_time = 7 [
    json_name = "eventTime",
    (gnostic.openapi.v3.property) = {description: "事件发生时间，记录事件实际发生的时间点，通常由客户端上报，可能存在时钟偏差"}
  ]; // 事件发生时间，记录事件实际发生的时间点，通常由客户端上报，可能存在时钟偏差
  int64 event_ts = 8 [
    json_name = "eventTs",
    (gnostic.openapi.v3.property) = {description: "事件时间戳，事件发生时间的 Unix 时间戳表示，单位毫秒，可以用于快速的时间范围查询和排序"}
  ];  // 事件时间戳，事件发生时间的 Unix 时间戳表示，单位毫秒，可以用于快速的时间范围查询和排序
  google.protobuf.Timestamp server_time = 9 [
    json_name = "serverTime",
    (gnostic.openapi.v3.property) = {description: "服务器接收时间，记录事件被服务器接收的时间点，可以用于分析事件的传输延迟和时序关系"}
  ]; // 服务器接收时间，记录事件被服务器接收的时间点，可以用于分析事件的传输延迟和时序关系

  // 行为：What
  EventCategory event_category = 10 [
    json_name = "eventCategory",
    (gnostic.openapi.v3.property) = {description: "事件类别，事件的类型或分类，用于对事件进行分组和分析，具体类别由业务定义"}
  ]; // 事件类别，事件的类型或分类，用于对事件进行分组和分析，具体类别由业务定义
  string event_name = 11 [
    json_name = "eventName",
    (gnostic.openapi.v3.property) = {description: "事件名称，事件的具体名称或动作，用于描述事件的具体行为，通常与事件类别结合使用以提供更细粒度的行为描述"}
  ]; // 事件名称，事件的具体名称或动作，用于描述事件的具体行为，通常与事件类别结合使用以提供更细粒度的行为描述
  string event_action = 12 [
    json_name = "eventAction",
    (gnostic.openapi.v3.property) = {description: "事件动作，事件的具体动作或结果，用于描述事件发生后的结果或状态变化，可以用于分析事件的效果和用户的反应"}
  ]; // 事件动作，事件的具体动作或结果，用于描述事件发生后的结果或状态变化，可以用于分析事件的效果和用户的反应

  // 客体：Object
  string object_type = 13 [
    json_name = "objectType",
    (gnostic.openapi.v3.property) = {description: "对象类型，事件作用的对象类型，可以是商品、页面、功能等，具体含义由业务定义"}
  ]; // 对象类型，事件作用的对象类型，可以是商品、页面、功能等，具体含义由业务定义
  string object_id = 14 [
    json_name = "objectId",
    (gnostic.openapi.v3.property) = {description: "对象ID，事件作用的对象标识，可以用于分析特定对象的行为特征和受欢迎程度"}
  ]; // 对象ID，事件作用的对象标识，可以用于分析特定对象的行为特征和受欢迎程度
  string object_name = 15 [
    json_name = "objectName",
    (gnostic.openapi.v3.property) = {description: "对象名称，事件作用的对象名称，可以提供更友好的对象描述，便于分析和展示"}
  ]; // 对象名称，事件作用的对象名称，可以提供更友好的对象描述，便于分析和展示

  // 上下文：Context
  string session_id = 16 [
    json_name = "sessionId",
    (gnostic.openapi.v3.property) = {description: "会话ID，事件所属的会话标识，可以用于分析用户的会话行为和路径，通常由客户端上报，可能存在时钟偏差"}
  ]; // 会话ID，事件所属的会话标识，可以用于分析用户的会话行为和路径，通常由客户端上报，可能存在时钟偏差
  uint32 session_seq = 17 [
    json_name = "sessionSeq",
    (gnostic.openapi.v3.property) = {description: "会话内序列号，事件在所属会话中的序列号，用于分析事件的顺序和路径，可以由客户端上报，也可以由服务器根据 session_id 进行计算生成"}
  ]; // 会话内序列号，事件在所属会话中的序列号，用于分析事件的顺序和路径，可以由客户端上报，也可以由服务器根据 session_id 进行计算生成

  // 环境
  Platform platform = 18 [
    json_name = "platform",
    (gnostic.openapi.v3.property) = {description: "平台，事件发生的环境平台，可以是 Web、iOS、Android、PC 等，具体类别由业务定义"}
  ]; // 平台，事件发生的环境平台，可以是 Web、iOS、Android、PC 等，具体类别由业务定义
  string os = 19 [
    json_name = "os",
    (gnostic.openapi.v3.property) = {description: "操作系统，事件发生的操作系统信息，可以提供更细粒度的环境描述，便于分析不同操作系统上的行为差异"}
  ]; // 操作系统，事件发生的操作系统信息，可以提供更细粒度的环境描述，便于分析不同操作系统上的行为差异
  string app_version = 20 [
    json_name = "appVersion",
    (gnostic.openapi.v3.property) = {description: "应用版本，事件发生的应用版本信息，可以用于分析不同版本上的行为差异和版本升级的影响"}
  ]; // 应用版本，事件发生的应用版本信息，可以用于分析不同版本上的行为差异和版本升级的影响
  string channel = 21 [
    json_name = "channel",
    (gnostic.openapi.v3.property) = {description: "渠道，事件发生的渠道信息，可以用于分析不同渠道上的行为差异和渠道推广的效果"}
  ]; // 渠道，事件发生的渠道信息，可以用于分析不同渠道上的行为差异和渠道推广的效果

  // 网络 & 位置
  string ip = 22 [
    json_name = "ip",
    (gnostic.openapi.v3.property) = {description: "IP地址，事件发生时的客户端IP地址，可以用于分析用户的地理位置和网络特征"}
  ]; // IP地址，事件发生时的客户端IP地址，可以用于分析用户的地理位置和网络特征
  string ip_city = 23 [
    json_name = "ipCity",
    (gnostic.openapi.v3.property) = {description: "IP城市，事件发生时的IP地址解析出的城市信息，可以用于分析用户的地理位置特征"}
  ]; // IP城市，事件发生时的IP地址解析出的城市信息，可以用于分析用户的地理位置特征
  string country = 24 [
    json_name = "country",
    (gnostic.openapi.v3.property) = {description: "国家，事件发生时的IP地址解析出的国家信息，可以用于分析用户的地理位置特征"}
  ]; // 国家，事件发生时的IP地址解析出的国家信息，可以用于分析用户的地理位置特征
  string network = 25 [
    json_name = "network",
    (gnostic.openapi.v3.property) = {description: "网络类型，事件发生时的网络类型，可以是 WiFi、4G、5G 等，具体类别由业务定义"}
  ]; // 网络类型，事件发生时的网络类型，可以是 WiFi、4G、5G 等，具体类别由业务定义

  // 地理位置
  string geo = 39 [
    json_name = "geo",
    (gnostic.openapi.v3.property) = {description: "地理位置，经纬度信息，格式如 'lat,lng' 或 GeoJSON，用于更精细的地理分析"}
  ]; // 地理位置，经纬度信息，格式如 'lat,lng' 或 GeoJSON，用于更精细的地理分析

  // 客户端 User-Agent
  string user_agent = 40 [
    json_name = "userAgent",
    (gnostic.openapi.v3.property) = {description: "客户端 User-Agent 信息，记录客户端类型、版本、操作系统等特征，便于分析设备和环境"}
  ]; // 客户端 User-Agent 信息，记录客户端类型、版本、操作系统等特征，便于分析设备和环境

  // 来源页面/地址
  string referer = 41 [
    json_name = "referer",
    (gnostic.openapi.v3.property) = {description: "来源页面或来源地址，记录事件发生时的来源信息，便于分析流量来源和用户路径"}
  ]; // 来源页面或来源地址，记录事件发生时的来源信息，便于分析流量来源和用户路径

  // 业务上下文
  map<string, string> context = 26 [
    json_name = "context",
    (gnostic.openapi.v3.property) = {description: "业务上下文，事件的业务相关上下文信息，可以包含任意的键值对，由业务定义和使用，便于分析事件发生时的具体业务场景和条件"}
  ]; // 业务上下文，事件的业务相关上下文信息，可以包含任意的键值对，由业务定义和使用，便于分析事件发生时的具体业务场景和条件

  // 指标：Metrics
  uint32 duration_ms = 27 [
    json_name = "durationMs",
    (gnostic.openapi.v3.property) = {description: "持续时间，事件持续的时间长度，单位毫秒，可以用于分析事件的持续时间分布和用户的停留时间特征"}
  ]; // 持续时间，事件持续的时间长度，单位毫秒，可以用于分析事件的持续时间分布和用户的停留时间特征
  string amount = 28 [
    json_name = "amount",
    (gnostic.openapi.v3.property) = {description: "金额，事件相关的金额信息，可以用于分析用户的支付行为和消费特征，具体格式由业务定义，可以包含货币单位等信息"}
  ];  // 金额，事件相关的金额信息，可以用于分析用户的支付行为和消费特征，具体格式由业务定义，可以包含货币单位等信息
  uint32 quantity = 29 [
    json_name = "quantity",
    (gnostic.openapi.v3.property) = {description: "数量，事件相关的数量信息，可以用于分析用户的购买行为和消费特征，具体含义由业务定义"}
  ]; // 数量，事件相关的数量信息，可以用于分析用户的购买行为和消费特征，具体含义由业务定义
  int32 score = 30 [
    json_name = "score",
    (gnostic.openapi.v3.property) = {description: "评分，事件相关的评分信息，可以用于分析用户的评价行为和满意度特征，具体含义由业务定义"}
  ]; // 评分，事件相关的评分信息，可以用于分析用户的评价行为和满意度特征，具体含义由业务定义
  map<string, double> metrics = 31 [
    json_name = "metrics",
    (gnostic.openapi.v3.property) = {description: "其他指标，事件的其他相关指标信息，可以包含任意的键值对，值为数值类型，由业务定义和使用，便于分析事件的其他量化特征"}
  ]; // 其他指标，事件的其他相关指标信息，可以包含任意的键值对，值为数值类型，由业务定义和使用，便于分析事件的其他量化特征

  // 扩展属性
  map<string, string> properties = 32 [
    json_name = "properties",
    (gnostic.openapi.v3.property) = {description: "扩展属性，事件的其他相关属性信息，可以包含任意的键值对，由业务定义和使用，便于分析事件的其他特征和细节"}
  ]; // 扩展属性，事件的其他相关属性信息，可以包含任意的键值对，由业务定义和使用，便于分析事件的其他特征和细节

  // 企业级字段
  OpResult op_result = 33 [
    json_name = "opResult",
    (gnostic.openapi.v3.property) = {description: "操作结果，事件相关的操作结果信息，可以用于分析事件的成功率和失败原因，具体含义由业务定义"}
  ]; // 操作结果，事件相关的操作结果信息，可以用于分析事件的成功率和失败原因，具体含义由业务定义
  string error_code = 34 [
    json_name = "errorCode",
    (gnostic.openapi.v3.property) = {description: "错误码，事件相关的错误码信息，可以用于分析事件的失败原因和问题排查，具体含义由业务定义"}
  ]; // 错误码，事件相关的错误码信息，可以用于分析事件的失败原因和问题排查，具体含义由业务定义
  RiskLevel risk_level = 35 [
    json_name = "riskLevel",
    (gnostic.openapi.v3.property) = {description: "风险等级，事件相关的风险等级信息，可以用于分析事件的风险特征和安全问题，具体含义由业务定义"}
  ]; // 风险等级，事件相关的风险等级信息，可以用于分析事件的风险特征和安全问题，具体含义由业务定义
  string trace_id = 36 [
    json_name = "traceId",
    (gnostic.openapi.v3.property) = {description: "Trace ID，事件相关的分布式追踪标识，可以用于分析事件的调用链和系统性能，通常由服务器生成并传递给客户端进行上报"}
  ]; // Trace ID，事件相关的分布式追踪标识，可以用于分析事件的调用链和系统性能，通常由服务器生成并传递给客户端进行上报

  // 系统字段
  google.protobuf.Timestamp ingest_time = 37 [
    json_name = "ingestTime",
    (gnostic.openapi.v3.property) = {description: "接收时间，事件被系统接收的时间点，由服务器生成，记录事件进入系统的时间，可以用于分析事件的处理延迟和时序关系"}
  ]; // 接收时间，事件被系统接收的时间点，由服务器生成，记录事件进入系统的时间，可以用于分析事件的处理延迟和时序关系
  uint32 version = 38 [
    json_name = "version",
    (gnostic.openapi.v3.property) = {description: ""}
  ]; // 版本号，事件数据的版本信息，可以用于数据格式的演进和兼容性处理，具体含义由业务定义
}

