syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/timestamp.proto";

import "uba/service/v1/behavior_event.proto";
import "uba/service/v1/event_path.proto";
import "uba/service/v1/risk_event.proto";
import "uba/service/v1/risk_rule.proto";

// 上报服务
service ReportService {
  // 统一上报接口（支持多事件类型）
  rpc PostReport(PostReportRequest) returns (PostReportResponse) {}
}

message PostReportRequest {
  string app_id = 1 [
    json_name = "appId",
    (gnostic.openapi.v3.property) = {description: "UBA应用唯一标识，关联应用维度，鉴权/路由关键字段"}
  ];
  string app_secret = 2 [
    json_name = "appSecret",
    (gnostic.openapi.v3.property) = {description: "密钥，鉴权使用，鉴权/路由关键字段"}
  ];

  // 支持混合上报（不同事件类型可在同一请求）
  repeated ReportEvent events = 3;

  ClientInfo client_info = 4 [
    json_name = "clientInfo",
    (gnostic.openapi.v3.property) = {description: "客户端信息，服务端可解析用于补全事件上下文和分析"}
  ];
}

// 统一事件结构，包含通用字段和不同事件类型的特有字段
message ReportEvent {
  // 事件类型枚举
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;

    BEHAVIOR = 1;    // 行为事件
    RISK = 2;        // 风险事件

    // 保留区间
    reserved 10 to 99;
    reserved "EVENT_TYPE_RESERVED";
  }

  // 事件类型（路由关键字段）
  EventType event_type = 1 [
    json_name = "eventType",
    (gnostic.openapi.v3.property) = {description: "事件类型，区分不同事件结构和处理逻辑，路由关键字段"}
  ];

  // 通用字段（所有事件类型共有）
  string event_id = 2 [
    json_name = "eventId",
    (gnostic.openapi.v3.property) = {description: "事件ID，全局唯一标识一条事件记录，建议使用ULID或Snowflake生成"}
  ];
  optional uint32 user_id = 3 [
    json_name = "userId",
    (gnostic.openapi.v3.property) = {description: "登录用户ID，唯一标识一个用户，未登录可不填或填0"}
  ];
  string device_id = 4 [
    json_name = "deviceId",
    (gnostic.openapi.v3.property) = {description: "设备指纹，标识用户使用的设备，未登录用户可通过设备ID进行关联分析"}
  ];
  google.protobuf.Timestamp event_time = 5 [
    json_name = "eventTime",
    (gnostic.openapi.v3.property) = {description: "事件时间，客户端事件发生的时间，建议使用ISO 8601格式的UTC时间"}
  ];
  string event_name = 6 [
    json_name = "eventName",
    (gnostic.openapi.v3.property) = {description: "事件名称，具体事件的标识，如登录、点击、购买等"}
  ];
  string event_category = 7 [
    json_name = "eventCategory",
    (gnostic.openapi.v3.property) = {description: "事件大类，事件的分类标识，如行为事件、路径事件、风险事件等"}
  ];

  // 上下文（所有事件类型共有）
  string session_id = 8 [
    json_name = "sessionId",
    (gnostic.openapi.v3.property) = {description: "会话ID，事件所属会话的唯一标识，关联分析关键字段"}
  ];
  string platform = 9 [
    json_name = "platform",
    (gnostic.openapi.v3.property) = {description: "平台，事件发生的平台或渠道，如Web、iOS、Android等"}
  ];
  string ip = 10 [
    json_name = "ip",
    (gnostic.openapi.v3.property) = {description: "IP地址，事件发生时的客户端IP地址，服务端可解析为地理位置等信息"}
  ];
  map<string, string> properties = 11 [
    json_name = "properties",
    (gnostic.openapi.v3.property) = {description: "事件属性，键值对形式的扩展字段，用于记录事件的业务上下文信息"}
  ];
  uint32 tenant_id = 12 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户 ID，SaaS 多租户隔离关键字段"}
  ];
  string trace_id = 13 [
    json_name = "traceId",
    (gnostic.openapi.v3.property) = {description: "链路追踪 ID，关联微服务调用链"}
  ];// 链路追踪 ID
  google.protobuf.Timestamp server_time = 14 [
    json_name = "serverTime",
    (gnostic.openapi.v3.property) = {description: "服务端接收时间，服务端处理事件的时间，单位毫秒"}
  ];  // 服务端接收时间

  oneof payload {
    BehaviorEvent behavior = 20;    // 行为事件
    RiskEvent risk = 30;            // 风险事件
  }
}

// 客户端信息结构，包含用户代理、来源 URL、地理位置信息等字段，服务端可解析用于补全事件上下文和分析
message ClientInfo {
  string user_agent = 1 [
    json_name = "userAgent",
    (gnostic.openapi.v3.property) = {description: "用户代理字符串，包含浏览器/客户端信息"}
  ];

  string referer = 2 [
    json_name = "referer",
    (gnostic.openapi.v3.property) = {description: "来源 URL，用户访问的上一跳 URL"}
  ];

  string country = 3 [
    json_name = "country",
    (gnostic.openapi.v3.property) = {description: "国家，基于 IP 地址解析的用户所在国家"}
  ];

  string city = 4 [
    json_name = "city",
    (gnostic.openapi.v3.property) = {description: "城市，基于 IP 地址解析的用户所在城市"}
  ];
}

message PostReportResponse {
  bool success = 1;
  string message = 2;

  // 按事件类型返回错误详情
  repeated TypeErrorDetail errors_by_type = 3 [
    json_name = "errorsByType",
    (gnostic.openapi.v3.property) = {description: "按事件类型分组的错误详情，包含事件类型和对应的错误列表"}
  ];

  string request_id = 4 [
    json_name = "requestId",
    (gnostic.openapi.v3.property) = {description: "请求追踪 ID，服务端生成的唯一标识一个请求的 ID，便于日志追踪和问题排查"}
  ];
  int64 server_time = 5 [
    json_name = "serverTime",
    (gnostic.openapi.v3.property) = {description: "服务端时间戳，服务端处理请求的时间，单位毫秒"}
  ];

  // 风控特有：实时处置建议
  optional RiskAction risk_action = 6 [
    json_name = "riskAction",
    (gnostic.openapi.v3.property) = {description: "风险事件的实时处置建议，只有风险事件上报时才会返回，表示服务端对该风险事件的处置建议"}
  ];

  int32 total_count = 10 [json_name = "totalCount"];      // 请求总事件数
  int32 success_count = 11 [json_name = "successCount"];  // 成功事件数
  int32 failed_count = 12 [json_name = "failedCount"];    // 失败事件数
}

// 按类型分组的错误详情
message TypeErrorDetail {
  string type = 1; // 事件类型，如 "behavior", "path", "risk"
  repeated ErrorDetail errors = 2;
}

// 错误详情
message ErrorDetail {
  string code = 1;

  string message = 2;

  string event_id = 3 [
    json_name = "eventId",
    (gnostic.openapi.v3.property) = {description: "失败的事件 ID，便于定位具体哪条事件上报失败"}
  ];
}
