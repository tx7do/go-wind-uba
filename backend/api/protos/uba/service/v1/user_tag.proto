syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";

import "pagination/v1/pagination.proto";

// 用户标签服务
service UserTagService {
  // 查询用户标签列表
  rpc List (pagination.PagingRequest) returns (ListUserTagResponse) {}

  // 查询用户标签数量
  rpc Count (pagination.PagingRequest) returns (CountUserTagResponse) {}

  // 查询用户标签详情
  rpc Get (GetUserTagRequest) returns (UserTag) {}

  // 创建用户标签
  rpc Create (CreateUserTagRequest) returns (UserTag) {}

  // 更新用户标签
  rpc Update (UpdateUserTagRequest) returns (UserTag) {}

  // 删除用户标签
  rpc Delete (DeleteUserTagRequest) returns (google.protobuf.Empty) {}
}

// 标签来源枚举
enum TagSource {
  // 未指定标签来源
  TAG_SOURCE_UNSPECIFIED = 0;

  // 人工打标
  TAG_SOURCE_MANUAL = 1;
  // 规则引擎
  TAG_SOURCE_RULE = 2;
  // 算法模型
  TAG_SOURCE_MODEL = 3;
  // 批量导入
  TAG_SOURCE_IMPORT = 4;
}

// 用户标签记录（对应 user_tag 表）
message UserTag {
  // 主键ID（自增长，唯一标识一条用户标签记录）
  optional uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "主键ID，自增长，唯一标识一条用户标签记录"}
  ];
  // 租户ID（多租户隔离，支持 SaaS 场景）
  optional uint32 tenant_id = 2 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID，多租户隔离，支持 SaaS 场景"}
  ];
  // 用户ID（唯一标识一个用户）
  optional uint32 user_id = 3 [
    json_name = "userId",
    (gnostic.openapi.v3.property) = {description: "用户ID，唯一标识一个用户"}
  ];
  // 标签ID（唯一标识一个标签）
  optional uint32 tag_id = 4 [
    json_name = "tagId",
    (gnostic.openapi.v3.property) = {description: "标签ID，唯一标识一个标签"}
  ];

  // 标签值（根据 tag_type 解析，实际存储值）
  optional string value = 5 [
    json_name = "value",
    (gnostic.openapi.v3.property) = {description: "标签值，根据 tag_type 解析，实际存储值"}
  ];
  // 标签值显示名称（枚举值的展示名称）
  optional string value_label = 6 [
    json_name = "valueLabel",
    (gnostic.openapi.v3.property) = {description: "标签值显示名称，枚举值的展示名称"}
  ];

  // 置信度（算法打标时，范围0~1）
  optional double confidence = 7 [
    json_name = "confidence",
    (gnostic.openapi.v3.property) = {description: "置信度，算法打标时，范围0~1"}
  ];

  // 标签来源（如人工打标、规则引擎、算法模型、批量导入等）
  optional string source = 8 [
    json_name = "source",
    (gnostic.openapi.v3.property) = {description: "标签来源，如人工打标、规则引擎、算法模型、批量导入等"}
  ];
  // 来源规则ID（如果是规则计算，记录规则ID）
  optional uint32 source_rule_id = 9 [
    json_name = "sourceRuleId",
    (gnostic.openapi.v3.property) = {description: "来源规则ID，如果是规则计算，记录规则ID"}
  ];

  // 有效时间（标签生效时间）
  optional google.protobuf.Timestamp effective_time = 10 [
    json_name = "effectiveTime",
    (gnostic.openapi.v3.property) = {description: "有效时间，标签生效时间"}
  ];
  // 过期时间（标签失效时间）
  optional google.protobuf.Timestamp expire_time = 11 [
    json_name = "expireTime",
    (gnostic.openapi.v3.property) = {description: "过期时间，标签失效时间"}
  ];

  optional uint32 created_by = 100 [json_name = "createdBy", (gnostic.openapi.v3.property) = {description: "创建者用户ID"}]; // 创建者用户ID
  optional uint32 updated_by = 101 [json_name = "updatedBy", (gnostic.openapi.v3.property) = {description: "更新者用户ID"}]; // 更新者用户ID
  optional uint32 deleted_by = 102 [json_name = "deletedBy", (gnostic.openapi.v3.property) = {description: "删除者用户ID"}]; // 删除者用户ID

  optional google.protobuf.Timestamp created_at = 200 [json_name = "createdAt", (gnostic.openapi.v3.property) = {description: "创建时间"}];// 创建时间
  optional google.protobuf.Timestamp updated_at = 201 [json_name = "updatedAt", (gnostic.openapi.v3.property) = {description: "更新时间"}];// 更新时间
  optional google.protobuf.Timestamp deleted_at = 202 [json_name = "deletedAt", (gnostic.openapi.v3.property) = {description: "删除时间"}];// 删除时间
}

// 获取用户标签列表 - 答复
message ListUserTagResponse {
  repeated UserTag items = 1;
  uint64 total = 2;
}

// 获取用户标签数据 - 请求
message GetUserTagRequest {
  oneof query_by {
    uint32 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {
      description: "视图字段过滤器，用于控制返回的字段"
    }
  ]; // 视图字段过滤器，用于控制返回的字段
}

// 创建用户标签 - 请求
message CreateUserTagRequest {
  UserTag data = 1;
}

// 更新用户标签 - 请求
message UpdateUserTagRequest {
  uint32 id = 1;

  UserTag data = 2 [
    json_name = "data",
    (gnostic.openapi.v3.property) = {description: "数据"}
  ]; // 数据

  google.protobuf.FieldMask update_mask = 3 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {
      description: "要更新的字段列表",
      example: {yaml : "id,realname,username"}
    }
  ]; // 要更新的字段列表

  optional bool allow_missing = 4 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。"}
  ]; // 如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。
}

// 删除用户标签 - 请求
message DeleteUserTagRequest {
  oneof query_by {
    uint32 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional uint32 deleted_by = 100 [
    json_name = "deletedBy",
    (gnostic.openapi.v3.property) = {description: "删除者用户ID"}
  ]; // 删除者用户ID
}

message CountUserTagResponse {
  uint64 count = 1;
}
