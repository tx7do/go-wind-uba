syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";

import "uba/service/v1/common.proto";

// 用户标签服务
service UserTagService {
}

// 标签定义（对应 tag_definition 表）
message TagDefinition {
  // 标签ID（唯一标识一个标签）
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "标签ID，唯一标识一个标签"}
  ];
  // 租户ID（多租户隔离，支持 SaaS 场景）
  uint32 tenant_id = 2 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID，多租户隔离，支持 SaaS 场景"}
  ];

  // 标签名称（显示名称）
  string name = 3 [
    json_name = "name",
    (gnostic.openapi.v3.property) = {description: "标签名称，显示名称"}
  ];
  // 标签唯一代码，业务唯一标识，支持英文、数字、下划线
  string code = 4 [
    json_name = "code",
    (gnostic.openapi.v3.property) = {description: "标签唯一代码，业务唯一标识，支持英文、数字、下划线"}
  ];

  // 标签描述（详细说明）
  string description = 5 [
    json_name = "description",
    (gnostic.openapi.v3.property) = {description: "标签描述，详细说明"}
  ];
  // 标签分类（如用户属性、行为偏好、风险、业务等）
  TagCategory category = 6 [
    json_name = "category",
    (gnostic.openapi.v3.property) = {description: "标签分类，如用户属性、行为偏好、风险、业务等"}
  ];

  // 标签类型（如布尔、枚举、数值、字符串、列表等）
  TagType tag_type = 10 [
    json_name = "tagType",
    (gnostic.openapi.v3.property) = {description: "标签类型，如布尔、枚举、数值、字符串、列表等"}
  ];

  // 计算规则（简化，实际可用表达式引擎，如 CEL/SQL）
  TagRule rule = 11 [
    json_name = "rule",
    (gnostic.openapi.v3.property) = {description: "计算规则，简化，实际可用表达式引擎，如 CEL/SQL"}
  ];

  // 取值范围（枚举型标签的允许值列表）
  repeated TagValue allowed_values = 12 [
    json_name = "allowedValues",
    (gnostic.openapi.v3.property) = {description: "取值范围，枚举型标签的允许值列表"}
  ];

  // 是否系统预置（true: 系统预置，false: 用户自定义）
  bool is_system = 13 [
    json_name = "isSystem",
    (gnostic.openapi.v3.property) = {description: "是否系统预置，true: 系统预置，false: 用户自定义"}
  ];
  // 是否动态标签（true: 动态计算，false: 静态打标）
  bool is_dynamic = 14 [
    json_name = "isDynamic",
    (gnostic.openapi.v3.property) = {description: "是否动态标签，true: 动态计算，false: 静态打标"}
  ];
  // 动态标签刷新间隔（单位秒）
  uint32 refresh_interval_seconds = 15 [
    json_name = "refreshIntervalSeconds",
    (gnostic.openapi.v3.property) = {description: "动态标签刷新间隔，单位秒"}
  ];

  optional uint32 created_by = 100 [json_name = "createdBy", (gnostic.openapi.v3.property) = {description: "创建者用户ID"}]; // 创建者用户ID
  optional uint32 updated_by = 101 [json_name = "updatedBy", (gnostic.openapi.v3.property) = {description: "更新者用户ID"}]; // 更新者用户ID
  optional uint32 deleted_by = 102 [json_name = "deletedBy", (gnostic.openapi.v3.property) = {description: "删除者用户ID"}]; // 删除者用户ID

  optional google.protobuf.Timestamp created_at = 200 [json_name = "createdAt", (gnostic.openapi.v3.property) = {description: "创建时间"}];// 创建时间
  optional google.protobuf.Timestamp updated_at = 201 [json_name = "updatedAt", (gnostic.openapi.v3.property) = {description: "更新时间"}];// 更新时间
  optional google.protobuf.Timestamp deleted_at = 202 [json_name = "deletedAt", (gnostic.openapi.v3.property) = {description: "删除时间"}];// 删除时间
}

// 标签分类枚举
enum TagCategory {
  // 未指定标签分类
  TAG_CATEGORY_UNSPECIFIED = 0;

  // 用户属性标签
  TAG_CATEGORY_USER = 1;
  // 行为偏好标签
  TAG_CATEGORY_BEHAVIOR = 2;
  // 风险标签
  TAG_CATEGORY_RISK = 3;
  // 业务标签
  TAG_CATEGORY_BUSINESS = 4;
}

// 标签类型枚举
enum TagType {
  // 未指定标签类型
  TAG_TYPE_UNSPECIFIED = 0;

  // 布尔型标签（是/否）
  TAG_TYPE_BOOLEAN = 1;
  // 枚举型标签
  TAG_TYPE_ENUM = 2;
  // 数值型标签
  TAG_TYPE_NUMERIC = 3;
  // 字符串型标签
  TAG_TYPE_STRING = 4;
  // 列表型标签
  TAG_TYPE_LIST = 5;
}

// 标签来源枚举
enum TagSource {
  // 未指定标签来源
  TAG_SOURCE_UNSPECIFIED = 0;

  // 人工打标
  TAG_SOURCE_MANUAL = 1;
  // 规则引擎
  TAG_SOURCE_RULE = 2;
  // 算法模型
  TAG_SOURCE_MODEL = 3;
  // 批量导入
  TAG_SOURCE_IMPORT = 4;
}

// 标签规则定义（简化，实际可根据需求扩展为更复杂的表达式结构）
message TagRule {
  // 规则表达式（如 CEL/SQL，示例: "total_pay_amount > 1000 AND last_pay_time > now() - 30d"）
  string expression = 1 [
    json_name = "expression",
    (gnostic.openapi.v3.property) = {description: "规则表达式，如 CEL/SQL，示例: 'total_pay_amount > 1000 AND last_pay_time > now() - 30d'"}
  ];
  // 规则参数（键值对形式，支持自定义参数）
  map<string, string> params = 2 [
    json_name = "params",
    (gnostic.openapi.v3.property) = {description: "规则参数，键值对形式，支持自定义参数"}
  ];
}

// 标签值定义（用于枚举型标签的取值范围）
message TagValue {
  // 标签值（实际存储值）
  string value = 1 [
    json_name = "value",
    (gnostic.openapi.v3.property) = {description: "标签值，实际存储值"}
  ];
  // 标签值显示名称（用于展示）
  string label = 2 [
    json_name = "label",
    (gnostic.openapi.v3.property) = {description: "标签值显示名称，用于展示"}
  ];
  // 标签值描述（详细说明）
  string description = 3 [
    json_name = "description",
    (gnostic.openapi.v3.property) = {description: "标签值描述，详细说明"}
  ];
}

// 用户标签记录（对应 user_tag 表）
message UserTag {
  // 租户ID（多租户隔离，支持 SaaS 场景）
  uint32 tenant_id = 1 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID，多租户隔离，支持 SaaS 场景"}
  ];
  // 用户ID（唯一标识一个用户）
  uint32 user_id = 2 [
    json_name = "userId",
    (gnostic.openapi.v3.property) = {description: "用户ID，唯一标识一个用户"}
  ];
  // 标签ID（唯一标识一个标签）
  uint32 tag_id = 3 [
    json_name = "tagId",
    (gnostic.openapi.v3.property) = {description: "标签ID，唯一标识一个标签"}
  ];

  // 标签值（根据 tag_type 解析，实际存储值）
  string value = 4 [
    json_name = "value",
    (gnostic.openapi.v3.property) = {description: "标签值，根据 tag_type 解析，实际存储值"}
  ];
  // 标签值显示名称（枚举值的展示名称）
  string value_label = 5 [
    json_name = "valueLabel",
    (gnostic.openapi.v3.property) = {description: "标签值显示名称，枚举值的展示名称"}
  ];

  // 置信度（算法打标时，范围0~1）
  float confidence = 6 [
    json_name = "confidence",
    (gnostic.openapi.v3.property) = {description: "置信度，算法打标时，范围0~1"}
  ];

  // 标签来源（如人工打标、规则引擎、算法模型、批量导入等）
  TagSource source = 7 [
    json_name = "source",
    (gnostic.openapi.v3.property) = {description: "标签来源，如人工打标、规则引擎、算法模型、批量导入等"}
  ];
  // 来源规则ID（如果是规则计算，记录规则ID）
  string source_rule_id = 8 [
    json_name = "sourceRuleId",
    (gnostic.openapi.v3.property) = {description: "来源规则ID，如果是规则计算，记录规则ID"}
  ];

  // 有效时间（标签生效时间）
  google.protobuf.Timestamp effective_time = 9 [
    json_name = "effectiveTime",
    (gnostic.openapi.v3.property) = {description: "有效时间，标签生效时间"}
  ];
  // 过期时间（标签失效时间）
  google.protobuf.Timestamp expire_time = 10 [
    json_name = "expireTime",
    (gnostic.openapi.v3.property) = {description: "过期时间，标签失效时间"}
  ];

  // 更新时间（标签最近一次更新的时间）
  google.protobuf.Timestamp update_time = 11 [
    json_name = "updateTime",
    (gnostic.openapi.v3.property) = {description: "更新时间，标签最近一次更新的时间"}
  ];
}
