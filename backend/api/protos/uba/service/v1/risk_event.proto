syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/empty.proto";

import "pagination/v1/pagination.proto";

import "uba/service/v1/common.proto";

// 风险事件服务
service RiskEventService {
  // 查询风险事件列表
  rpc List (pagination.PagingRequest) returns (ListRiskEventResponse) {}

  // 查询风险事件数量
  rpc Count (pagination.PagingRequest) returns (CountRiskEventResponse) {}

  // 查询风险事件详情
  rpc Get (GetRiskEventRequest) returns (RiskEvent) {}

  // 创建风险事件
  rpc Create (RiskEvent) returns (google.protobuf.Empty) {}

  // 批量创建风险事件
  rpc BatchCreate (BatchCreateRiskEventRequest) returns (google.protobuf.Empty) {}
}

// 风险事件
message RiskEvent {
  // 处置状态
  enum Status {
    // 未指定处置状态
    RISK_EVENT_STATUS_UNSPECIFIED = 0;

    // 待处理
    PENDING = 1;
    // 调查中
    INVESTIGATING = 2;
    // 确认为风险
    CONFIRMED = 3;
    // 误报
    FALSE_POSITIVE = 4;
    // 忽略
    IGNORED = 5;
    // 自动拦截
    AUTO_BLOCKED = 6;
  }

  string risk_event_id = 1 [
    json_name = "riskEventId",
    (gnostic.openapi.v3.property) = { description: "风险事件ID" }
  ]; // 风险事件ID

  // 租户ID（多租户隔离，支持 SaaS 场景）
  optional uint32 tenant_id = 2 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID，多租户隔离，支持 SaaS 场景"}
  ];

  // 用户ID（关联主体，风险事件涉及的用户）
  optional uint32 user_id = 3 [
    json_name = "userId",
    (gnostic.openapi.v3.property) = {description: "用户ID，关联主体，风险事件涉及的用户"}
  ];
  // 设备ID（关联主体，风险事件涉及的设备）
  optional string device_id = 4 [
    json_name = "deviceId",
    (gnostic.openapi.v3.property) = {description: "设备ID，关联主体，风险事件涉及的设备"}
  ];
  // 全局用户ID（跨平台唯一标识用户）
  optional string global_user_id = 5 [
    json_name = "globalUserId",
    (gnostic.openapi.v3.property) = {description: "全局用户ID，跨平台唯一标识用户"}
  ];

  // 风险类型
  optional string risk_type = 6 [
    json_name = "riskType",
    (gnostic.openapi.v3.property) = {description: "风险类型，标识风险事件的类型"}
  ];
  // 风险等级
  optional string risk_level = 7 [
    json_name = "riskLevel",
    (gnostic.openapi.v3.property) = {description: "风险等级，标识风险事件的严重程度"}
  ];
  // 风险评分（0-100，风险事件的评分）
  optional float risk_score = 8 [
    json_name = "riskScore",
    (gnostic.openapi.v3.property) = {description: "风险评分，0-100，风险事件的评分"}
  ];

  // 触发规则ID
  optional uint32 rule_id = 10 [
    json_name = "ruleId",
    (gnostic.openapi.v3.property) = {description: "触发规则ID，标识触发风险事件的规则"}
  ];
  // 规则名称
  optional string rule_name = 11 [
    json_name = "ruleName",
    (gnostic.openapi.v3.property) = {description: "规则名称，触发风险事件的规则名称"}
  ];
  // 规则上下文（触发条件，结构化信息）
  optional google.protobuf.Struct rule_context = 12 [
    json_name = "ruleContext",
    (gnostic.openapi.v3.property) = {description: "规则上下文，触发条件，结构化信息"}
  ];

  // 关联行为事件ID列表（风险事件关联的行为事件）
  repeated string related_event_ids = 13 [
    json_name = "relatedEventIds",
    (gnostic.openapi.v3.property) = {description: "关联行为事件ID列表，风险事件关联的行为事件"}
  ];
  // 会话ID（风险事件发生时的会话标识）
  optional string session_id = 14 [
    json_name = "sessionId",
    (gnostic.openapi.v3.property) = {description: "会话ID，风险事件发生时的会话标识"}
  ];

  // 风险详情描述
  optional string description = 15 [
    json_name = "description",
    (gnostic.openapi.v3.property) = {description: "风险详情描述，风险事件的详细说明"}
  ];
  // 证据（风险事件相关证据，键值对形式）
  map<string, string> evidence = 16 [
    json_name = "evidence",
    (gnostic.openapi.v3.property) = {description: "证据，风险事件相关证据，键值对形式"}
  ];

  // 处置状态
  optional Status status = 17 [
    json_name = "status",
    (gnostic.openapi.v3.property) = {description: "处置状态，风险事件的处理状态"}
  ];
  // 处理人ID
  optional uint32 handler_id = 18 [
    json_name = "handlerId",
    (gnostic.openapi.v3.property) = {description: "处理人ID，风险事件的处理人"}
  ];
  // 处理时间
  optional google.protobuf.Timestamp handled_time = 19 [
    json_name = "handledTime",
    (gnostic.openapi.v3.property) = {description: "处理时间，风险事件被处理的时间"}
  ];
  // 处理备注
  optional string handle_remark = 20 [
    json_name = "handleRemark",
    (gnostic.openapi.v3.property) = {description: "处理备注，风险事件处理的说明"}
  ];

  // 风险事件发生时间
  optional google.protobuf.Timestamp occur_time = 21 [
    json_name = "occurTime",
    (gnostic.openapi.v3.property) = {description: "风险事件发生时间"}
  ];
  // 风险事件上报时间
  optional google.protobuf.Timestamp report_time = 22 [
    json_name = "reportTime",
    (gnostic.openapi.v3.property) = {description: "风险事件上报时间"}
  ];

  optional uint32 created_by = 100 [json_name = "createdBy", (gnostic.openapi.v3.property) = {description: "创建者用户ID"}]; // 创建者用户ID
  optional uint32 updated_by = 101 [json_name = "updatedBy", (gnostic.openapi.v3.property) = {description: "更新者用户ID"}]; // 更新者用户ID
  optional uint32 deleted_by = 102 [json_name = "deletedBy", (gnostic.openapi.v3.property) = {description: "删除者用户ID"}]; // 删除者用户ID

  optional google.protobuf.Timestamp created_at = 200 [json_name = "createdAt", (gnostic.openapi.v3.property) = {description: "创建时间"}];// 创建时间
  optional google.protobuf.Timestamp updated_at = 201 [json_name = "updatedAt", (gnostic.openapi.v3.property) = {description: "更新时间"}];// 更新时间
  optional google.protobuf.Timestamp deleted_at = 202 [json_name = "deletedAt", (gnostic.openapi.v3.property) = {description: "删除时间"}];// 删除时间
}

// 风险事件统计摘要
message RiskEventSummary {
  // 风险事件总数
  int64 total_count = 1 [
    json_name = "totalCount",
    (gnostic.openapi.v3.property) = {description: "风险事件总数"}
  ];
  // 按风险等级分布统计
  map<string, int64> by_level = 2 [
    json_name = "byLevel",
    (gnostic.openapi.v3.property) = {description: "按风险等级分布统计"}
  ];
  // 按风险类型分布统计
  map<string, int64> by_type = 3 [
    json_name = "byType",
    (gnostic.openapi.v3.property) = {description: "按风险类型分布统计"}
  ];
  // 按处置状态分布统计
  map<string, int64> by_status = 4 [
    json_name = "byStatus",
    (gnostic.openapi.v3.property) = {description: "按处置状态分布统计"}
  ];
  // 平均风险评分
  double avg_risk_score = 5 [
    json_name = "avgRiskScore",
    (gnostic.openapi.v3.property) = {description: "平均风险评分"}
  ];
}

// 获取风险事件列表 - 答复
message ListRiskEventResponse {
  repeated RiskEvent items = 1;
  uint64 total = 2;
}

// 获取风险事件数据 - 请求
message GetRiskEventRequest {
  oneof query_by {
    uint64 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {
      description: "视图字段过滤器，用于控制返回的字段"
    }
  ]; // 视图字段过滤器，用于控制返回的字段
}

// 创建风险事件 - 请求
message CreateRiskEventRequest {
  RiskEvent data = 1;
}

message BatchCreateRiskEventRequest {
  repeated RiskEvent items = 1;
}

// 更新风险事件 - 请求
message UpdateRiskEventRequest {
  uint64 id = 1;

  RiskEvent data = 2 [
    json_name = "data",
    (gnostic.openapi.v3.property) = {description: "数据"}
  ]; // 数据

  google.protobuf.FieldMask update_mask = 3 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {
      description: "要更新的字段列表",
      example: {yaml : "id,realname,username"}
    }
  ]; // 要更新的字段列表

  optional bool allow_missing = 4 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。"}
  ]; // 如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。
}

// 删除风险事件 - 请求
message DeleteRiskEventRequest {
  oneof query_by {
    uint64 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional uint32 deleted_by = 100 [
    json_name = "deletedBy",
    (gnostic.openapi.v3.property) = {description: "删除者用户ID"}
  ]; // 删除者用户ID
}

message CountRiskEventResponse {
  uint64 count = 1;
}
