syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/timestamp.proto";

// 数据分析服务（BI 聚合查询）
service AnalyticsService {
  // 事件量趋势（按时间粒度分桶）
  rpc EventTrend(EventTrendRequest) returns (EventTrendResponse) {}

  // 漏斗分析
  rpc Funnel(FunnelRequest) returns (FunnelResponse) {}

  // 留存分析（同期群矩阵）
  rpc Retention(RetentionRequest) returns (RetentionResponse) {}

  // 维度分组聚合（平台/渠道/地区/版本等）
  rpc GroupBy(GroupByRequest) returns (GroupByResponse) {}

  // 活跃用户（DAU/WAU/MAU）
  rpc ActiveUsers(ActiveUsersRequest) returns (ActiveUsersResponse) {}

  // 归因分析（首触/末触渠道归因）
  rpc Attribution(AttributionRequest) returns (AttributionResponse) {}

  // 分布分析（事件时长分桶 + 分位数）
  rpc Distribution(DistributionRequest) returns (DistributionResponse) {}

  // 行为序列（指定用户的行为时间线）
  rpc BehaviorSequence(BehaviorSequenceRequest) returns (BehaviorSequenceResponse) {}

  // 用户分群/圈选（做过/未做过某事件的人群筛选）
  rpc Segmentation(SegmentationRequest) returns (SegmentationResponse) {}

  // 点击热力图（按页面网格分桶聚合点击坐标）
  rpc Click(ClickRequest) returns (ClickResponse) {}

  // 用户生命周期（新/活跃/留存/流失/回流 阶段分布）
  rpc Lifecycle(LifecycleRequest) returns (LifecycleResponse) {}

  // 流失与回流分析（静默天数判定流失，回流触发事件）
  rpc Churn(ChurnRequest) returns (ChurnResponse) {}

  // 间隔时间分析（两事件之间的时间间隔分布）
  rpc Interval(IntervalRequest) returns (IntervalResponse) {}

  // 矩阵/象限分析（双轴分四象限，识别核心/边缘功能）
  rpc Matrix(MatrixRequest) returns (MatrixResponse) {}

  // 付费/营收分析（ARPU/ARPPU/付费率/GMV 趋势）
  rpc Revenue(RevenueRequest) returns (RevenueResponse) {}

  // 会话分析（跳出率/时长分位 P50/P90/会话深度）
  rpc SessionAnalysis(SessionAnalysisRequest) returns (SessionAnalysisResponse) {}

  // 同比环比/异常检测（事件 PV/UV 环比涨跌 + 7日基线异常预警）
  rpc Anomaly(AnomalyRequest) returns (AnomalyResponse) {}

  // 新老用户对比（构成占比 + 行为/付费差异）
  rpc NewVsOld(NewVsOldRequest) returns (NewVsOldResponse) {}

  // 热门转化路径（群体路径 TOP + 转化率）
  rpc PathSankey(PathSankeyRequest) returns (PathSankeyResponse) {}

  // 关卡/数值平衡分析（通过率/失败率/卡关率/分数分布）
  rpc LevelAnalysis(LevelAnalysisRequest) returns (LevelAnalysisResponse) {}

  // 鲸鱼用户/付费分层（按累计充值自动分层）
  rpc WhaleTier(WhaleTierRequest) returns (WhaleTierResponse) {}

  // 历史生命周期价值 LTV（用户在第 N 天的累计付费价值）
  rpc LTV(LTVRequest) returns (LTVResponse) {}

  // 滚服留存（按区服分组的留存）
  rpc ServerRetention(ServerRetentionRequest) returns (ServerRetentionResponse) {}

  // 同时在线 PCU/ACU（基于会话区间推算）
  rpc OnlineStats(OnlineStatsRequest) returns (OnlineStatsResponse) {}

  // 经济系统/代币流向（产出与消耗平衡）
  rpc Economy(EconomyRequest) returns (EconomyResponse) {}
}

// 时间粒度
enum AnalyticsGranularity {
  // 未指定（服务端按时间跨度自动选择）
  ANALYTICS_GRANULARITY_UNSPECIFIED = 0;
  // 小时
  HOUR = 1;
  // 天
  DAY = 2;
  // 周
  WEEK = 3;
  // 月
  MONTH = 4;
}

// 时间范围（毫秒时间戳，start/end 均含端点）
message TimeRange {
  // 起始时间（含），Unix 毫秒
  int64 start_ms = 1 [
    json_name = "startMs",
    (gnostic.openapi.v3.property) = {description: "起始时间（含），Unix 毫秒"}
  ];
  // 结束时间（含），Unix 毫秒
  int64 end_ms = 2 [
    json_name = "endMs",
    (gnostic.openapi.v3.property) = {description: "结束时间（含），Unix 毫秒"}
  ];
}

// 时间序列中的一个数据点
message TimeSeriesPoint {
  // 时间桶起点（Unix 毫秒）
  int64 timestamp = 1 [
    json_name = "timestamp",
    (gnostic.openapi.v3.property) = {description: "时间桶起点，Unix 毫秒"}
  ];
  // 数值
  double value = 2 [
    json_name = "value",
    (gnostic.openapi.v3.property) = {description: "数值"}
  ];
}

// ============== 事件趋势 ==============
message EventTrendRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 时间粒度
  AnalyticsGranularity granularity = 2 [json_name = "granularity"];
  // 应用 ID 过滤（可选，0 表示全部）
  optional uint32 app_id = 3 [json_name = "appId"];
  // 事件名过滤（可选，空表示全部事件）
  optional string event_name = 4 [json_name = "eventName"];
  // 平台过滤（可选）
  optional string platform = 5 [json_name = "platform"];
}

message EventTrendResponse {
  // 趋势数据点
  repeated TimeSeriesPoint points = 1 [json_name = "points"];
  // 时间粒度（服务端实际使用的粒度，可能因 UNSPECIFIED 而自动选择）
  AnalyticsGranularity granularity = 2 [json_name = "granularity"];
  // 区间内事件总量
  int64 total = 3 [json_name = "total"];
}

// ============== 漏斗分析 ==============
message FunnelStep {
  // 步骤序号（从 1 开始）
  uint32 step_index = 1 [json_name = "stepIndex"];
  // 该步骤的事件名
  string event_name = 2 [json_name = "eventName"];
  // 完成该步骤的事件数
  int64 count = 3 [json_name = "count"];
  // 相对上一步的转化率（0-1，首步为 1）
  double conversion_rate = 4 [json_name = "conversionRate"];
  // 相对首步的整体转化率（0-1，首步为 1）
  double overall_rate = 5 [json_name = "overallRate"];
}

message FunnelRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 漏斗步骤事件名（有序，至少 2 步）
  repeated string steps = 2 [json_name = "steps"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
  // 转化窗口（毫秒，用户必须在窗口内完成全部步骤，默认 30 分钟）
  optional int64 window_ms = 4 [json_name = "windowMs"];
}

message FunnelResponse {
  // 各步骤结果
  repeated FunnelStep steps = 1 [json_name = "steps"];
  // 完成全部步骤的用户数
  int64 completed_users = 2 [json_name = "completedUsers"];
  // 进入首步的用户数
  int64 entered_users = 3 [json_name = "enteredUsers"];
  // 整体转化率
  double overall_conversion = 4 [json_name = "overallConversion"];
}

// ============== 留存分析 ==============
message RetentionCell {
  // 相对注册/首次活跃的天数偏移（0 = 当天）
  uint32 offset_days = 1 [json_name = "offsetDays"];
  // 该偏移的活跃用户数
  int64 count = 2 [json_name = "count"];
  // 留存率（0-1）
  double rate = 3 [json_name = "rate"];
}

message RetentionCohort {
  // 同期群日期（Unix 毫秒，当天 0 点）
  int64 cohort_date = 1 [json_name = "cohortDate"];
  // 该同期群规模（首日用户数）
  int64 size = 2 [json_name = "size"];
  // 各偏移天的留存
  repeated RetentionCell cells = 3 [json_name = "cells"];
}

message RetentionRequest {
  // 时间范围（按 cohort_date 过滤）
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 留存类型：ACTIVE=活跃留存（默认），EVENT=指定事件留存
  optional string retention_type = 3 [json_name = "retentionType"];
  // 当 retention_type=EVENT 时指定事件名
  optional string event_name = 4 [json_name = "eventName"];
  // 最大偏移天数（默认 7）
  optional uint32 max_offset_days = 5 [json_name = "maxOffsetDays"];
}

message RetentionResponse {
  // 同期群列表
  repeated RetentionCohort cohorts = 1 [json_name = "cohorts"];
  // 所有偏移天列表（横轴）
  repeated uint32 offset_days = 2 [json_name = "offsetDays"];
}

// ============== 维度分组聚合 ==============
message GroupByRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 分组维度字段名（如 platform/channel/country/app_version/event_name）
  string dimension = 2 [json_name = "dimension"];
  // 聚合指标：COUNT=事件数(默认)，UNIQUE_USER=去重用户数，SUM_AMOUNT=金额求和
  optional string metric = 3 [json_name = "metric"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 4 [json_name = "appId"];
  // 事件名过滤（可选）
  optional string event_name = 5 [json_name = "eventName"];
  // 返回前 N 个分组（默认 20）
  optional uint32 top_n = 6 [json_name = "topN"];
}

message GroupByBucket {
  // 分组标签（维度值）
  string label = 1 [json_name = "label"];
  // 聚合数值
  double value = 2 [json_name = "value"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

message GroupByResponse {
  // 各分组结果
  repeated GroupByBucket buckets = 1 [json_name = "buckets"];
  // 维度字段名
  string dimension = 2 [json_name = "dimension"];
  // 总量
  double total = 3 [json_name = "total"];
}

// ============== 活跃用户 ==============
message ActiveUsersRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 时间粒度（DAU 按粒度分桶，同时给出 WAU/MAU 累计）
  AnalyticsGranularity granularity = 2 [json_name = "granularity"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
}

message ActiveUsersPoint {
  // 时间桶起点（Unix 毫秒）
  int64 timestamp = 1 [json_name = "timestamp"];
  // 日活
  int64 dau = 2 [json_name = "dau"];
  // 周活（滚动 7 天）
  int64 wau = 3 [json_name = "wau"];
  // 月活（滚动 30 天）
  int64 mau = 4 [json_name = "mau"];
}

message ActiveUsersResponse {
  // 各时间桶的活跃用户数据
  repeated ActiveUsersPoint points = 1 [json_name = "points"];
  // 最新一天的 DAU
  int64 latest_dau = 2 [json_name = "latestDau"];
}

// ============== 归因分析 ==============
message AttributionRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 转化事件名（如 pay_success）
  string conversion_event = 2 [json_name = "conversionEvent"];
  // 归因维度：channel 渠道（默认）/ referer 来源页
  optional string dimension = 3 [json_name = "dimension"];
  // 归因模型：last_touch 末次触达（默认）/ first_touch 首次触达
  optional string model = 4 [json_name = "model"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 5 [json_name = "appId"];
}

message AttributionBucket {
  // 归因维度值（渠道/来源页）
  string label = 1 [json_name = "label"];
  // 该触点的转化用户数（去重）
  int64 converter_uv = 2 [json_name = "converterUv"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

message AttributionResponse {
  // 各触点的归因贡献
  repeated AttributionBucket buckets = 1 [json_name = "buckets"];
  // 使用的归因模型
  string model = 2 [json_name = "model"];
  // 使用的归因维度
  string dimension = 3 [json_name = "dimension"];
  // 转化用户总数
  int64 total_converters = 4 [json_name = "totalConverters"];
}

// ============== 分布分析 ==============
message DistributionRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 目标事件名（如 page_view）
  string event_name = 2 [json_name = "eventName"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
}

// 分布分析分桶
message DistributionBucket {
  // 分桶标签（如 0_10s / 10_60s / 1_5min / 5min_plus）
  string bucket = 1 [json_name = "bucket"];
  // 该桶事件数
  int64 count = 2 [json_name = "count"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

// 分布分析分位数摘要
message DistributionSummary {
  // 平均时长（秒）
  double avg_sec = 1 [json_name = "avgSec"];
  // P50（中位数，秒）
  double p50_sec = 2 [json_name = "p50Sec"];
  // P90（秒）
  double p90_sec = 3 [json_name = "p90Sec"];
  // 最大值（秒）
  double max_sec = 4 [json_name = "maxSec"];
  // 总事件数
  int64 count = 5 [json_name = "count"];
}

message DistributionResponse {
  // 各分桶分布
  repeated DistributionBucket buckets = 1 [json_name = "buckets"];
  // 分位数摘要
  DistributionSummary summary = 2 [json_name = "summary"];
}

// ============== 行为序列 ==============
message BehaviorSequenceRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 用户 ID
  uint32 user_id = 2 [json_name = "userId"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
  // 事件名过滤（可选，空表示全部事件）
  optional string event_name = 4 [json_name = "eventName"];
  // 最多返回事件数（默认 100）
  optional uint32 limit = 5 [json_name = "limit"];
}

// 序列中的一个行为事件
message SequenceEvent {
  // 事件时间（Unix 毫秒）
  int64 timestamp = 1 [json_name = "timestamp"];
  // 事件名
  string event_name = 2 [json_name = "eventName"];
  // 会话 ID
  optional string session_id = 3 [json_name = "sessionId"];
  // 会话内序号
  optional uint32 session_seq = 4 [json_name = "sessionSeq"];
  // 来源页
  optional string referer = 5 [json_name = "referer"];
  // 平台
  optional string platform = 6 [json_name = "platform"];
  // 渠道
  optional string channel = 7 [json_name = "channel"];
}

message BehaviorSequenceResponse {
  // 用户 ID
  uint32 user_id = 1 [json_name = "userId"];
  // 按时间升序排列的行为事件
  repeated SequenceEvent events = 2 [json_name = "events"];
}

// ============== 用户分群/圈选 ==============
// 单个圈选条件
message SegmentCondition {
  // 事件名
  string event_name = 1 [json_name = "eventName"];
  // 至少触发次数（默认 1，即"做过"）
  optional uint32 min_times = 2 [json_name = "minTimes"];
}

message SegmentationRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 必须做过的事件（满足任一即纳入人群的"做过"集合）
  repeated SegmentCondition include = 2 [json_name = "include"];
  // 必须未做过的事件（做过任一即排除）
  repeated SegmentCondition exclude = 3 [json_name = "exclude"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 4 [json_name = "appId"];
  // 最多返回用户数（默认 5000）
  optional uint32 limit = 5 [json_name = "limit"];
}

message SegmentationResponse {
  // 命中的用户 ID 列表
  repeated uint32 user_ids = 1 [json_name = "userIds"];
  // 命中用户总数
  int64 total = 2 [json_name = "total"];
}

// ============== 点击热力图 ==============
message ClickRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 页面 URL（必填，按页面分组热力图）
  string page_url = 2 [json_name = "pageUrl"];
  // 网格大小（像素，默认 20）
  optional uint32 grid_size = 3 [json_name = "gridSize"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 4 [json_name = "appId"];
}

// 热力图网格点
message ClickHeatPoint {
  // 网格左上角 X（像素）
  uint32 x = 1 [json_name = "x"];
  // 网格左上角 Y（像素）
  uint32 y = 2 [json_name = "y"];
  // 该网格的点击次数
  int64 count = 3 [json_name = "count"];
  // 热度（0-1，相对最大点击数的归一化值）
  double intensity = 4 [json_name = "intensity"];
}

// 元素点击 TOP（按 element_xpath 聚合）
message ClickElementBucket {
  // 元素 XPath
  string element_xpath = 1 [json_name = "elementXpath"];
  // 点击次数
  int64 count = 2 [json_name = "count"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

message ClickResponse {
  // 热力图网格点列表
  repeated ClickHeatPoint points = 1 [json_name = "points"];
  // 元素点击 TOP
  repeated ClickElementBucket top_elements = 2 [json_name = "topElements"];
  // 总点击次数
  int64 total_clicks = 3 [json_name = "totalClicks"];
  // 使用的网格大小
  uint32 grid_size = 4 [json_name = "gridSize"];
}

// ============== 用户生命周期 ==============
message LifecycleRequest {
  // 时间范围（基准日，end_ms 视为"今天"）
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 新用户判定天数（注册距今 N 天内算新用户，默认 7）
  optional uint32 new_user_days = 3 [json_name = "newUserDays"];
  // 流失判定天数（最后活跃距今 > N 天算流失，默认 30）
  optional uint32 churn_days = 4 [json_name = "churnDays"];
}

// 生命周期阶段
message LifecycleStage {
  // 阶段标识：new_user / active / retained / churned / reactivated
  string stage = 1 [json_name = "stage"];
  // 阶段中文名
  string stage_label = 2 [json_name = "stageLabel"];
  // 该阶段用户数
  int64 user_count = 3 [json_name = "userCount"];
  // 占比（0-1）
  double percentage = 4 [json_name = "percentage"];
}

message LifecycleResponse {
  // 各阶段分布
  repeated LifecycleStage stages = 1 [json_name = "stages"];
  // 总用户数
  int64 total_users = 2 [json_name = "totalUsers"];
}

// ============== 流失与回流 ==============
message ChurnRequest {
  // 时间范围（回流窗口，end_ms 视为"今天"）
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 流失判定天数（最后活跃距今 > N 天算流失，默认 30）
  optional uint32 churn_days = 3 [json_name = "churnDays"];
  // 回流窗口（近 N 天内重新活跃算回流，默认 7）
  optional uint32 reactivation_days = 4 [json_name = "reactivationDays"];
}

// 流失时长分桶
message ChurnBucket {
  // 分桶标签：30_60d / 60_90d / 90_plus
  string bucket = 1 [json_name = "bucket"];
  // 该桶流失用户数
  int64 user_count = 2 [json_name = "userCount"];
}

// 回流触发事件 TOP
message ReactivationTrigger {
  // 事件名
  string event_name = 1 [json_name = "eventName"];
  // 触发次数
  int64 count = 2 [json_name = "count"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

message ChurnResponse {
  // 流失时长分布
  repeated ChurnBucket churn_buckets = 1 [json_name = "churnBuckets"];
  // 流失用户总数
  int64 churned_users = 2 [json_name = "churnedUsers"];
  // 回流用户数（曾是流失、近期又活跃）
  int64 reactivated_users = 3 [json_name = "reactivatedUsers"];
  // 回流率（reactivated / churned，0-1）
  double reactivation_rate = 4 [json_name = "reactivationRate"];
  // 回流触发事件 TOP
  repeated ReactivationTrigger triggers = 5 [json_name = "triggers"];
}

// ============== 间隔时间分析 ==============
message IntervalRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 起始事件名（如 register）
  string event_from = 2 [json_name = "eventFrom"];
  // 结束事件名（如 pay_success）
  string event_to = 3 [json_name = "eventTo"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 4 [json_name = "appId"];
}

// 间隔分桶
message IntervalBucket {
  // 分桶标签：instant / lt_1h / 1_24h / 1_7d / 7d_plus
  string bucket = 1 [json_name = "bucket"];
  // 该桶样本数
  int64 count = 2 [json_name = "count"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

message IntervalResponse {
  // 各分桶分布
  repeated IntervalBucket buckets = 1 [json_name = "buckets"];
  // 分位数摘要（单位：小时）
  double p50_hours = 2 [json_name = "p50Hours"];
  double p90_hours = 3 [json_name = "p90Hours"];
  double avg_hours = 4 [json_name = "avgHours"];
  // 总样本数
  int64 count = 5 [json_name = "count"];
}

// ============== 矩阵/象限分析 ==============
message MatrixRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 分析维度（默认 event_name）
  optional string dimension = 2 [json_name = "dimension"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
  // X/Y 的象限划分阈值类型：median 中位数（默认）/ avg 均值
  optional string split = 4 [json_name = "split"];
}

// 矩阵散点
message MatrixPoint {
  // 维度值（如事件名）
  string label = 1 [json_name = "label"];
  // X 轴值（使用人数，去重 UV）
  double x = 2 [json_name = "x"];
  // Y 轴值（使用频次，总次数）
  double y = 3 [json_name = "y"];
  // 象限：core 核心 / star 明星 / niche 小众 / edge 边缘
  string quadrant = 4 [json_name = "quadrant"];
}

message MatrixResponse {
  // 各散点（维度值 + 双轴值 + 象限）
  repeated MatrixPoint points = 1 [json_name = "points"];
  // X 轴阈值（中位数/均值）
  double x_threshold = 2 [json_name = "xThreshold"];
  // Y 轴阈值
  double y_threshold = 3 [json_name = "yThreshold"];
  // 使用的维度
  string dimension = 4 [json_name = "dimension"];
}

// ============== 付费/营收分析 ==============
message RevenueRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 时间粒度（默认 DAY）
  AnalyticsGranularity granularity = 3 [json_name = "granularity"];
}

// 单日营收数据点
message RevenuePoint {
  // 时间桶（Unix 毫秒）
  int64 timestamp = 1 [json_name = "timestamp"];
  // GMV（总成交额）
  double gmv = 2 [json_name = "gmv"];
  // 付费用户数
  int64 pay_users = 3 [json_name = "payUsers"];
  // 付费订单数
  int64 pay_orders = 4 [json_name = "payOrders"];
  // ARPU（GMV / 活跃用户数，活跃用户另查）
  double arpu = 5 [json_name = "arpu"];
  // ARPPU（GMV / 付费用户数）
  double arppu = 6 [json_name = "arppu"];
  // 付费率（0-1，pay_users / active_users）
  double pay_rate = 7 [json_name = "payRate"];
}

message RevenueResponse {
  // 按日/粒度的营收趋势
  repeated RevenuePoint points = 1 [json_name = "points"];
  // 区间 GMV 汇总
  double total_gmv = 2 [json_name = "totalGmv"];
  // 区间付费用户数（去重）
  int64 total_pay_users = 3 [json_name = "totalPayUsers"];
  // 区间订单数
  int64 total_pay_orders = 4 [json_name = "totalPayOrders"];
  // 客单价（GMV / 订单数）
  double avg_order_value = 5 [json_name = "avgOrderValue"];
}

// ============== 会话分析 ==============
message SessionAnalysisRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 平台过滤（可选，空表示全部）
  optional string platform = 3 [json_name = "platform"];
}

message SessionAnalysisResponse {
  // 会话总数
  int64 session_count = 1 [json_name = "sessionCount"];
  // 会话用户数（去重）
  int64 unique_users = 2 [json_name = "uniqueUsers"];
  // 平均会话时长（秒）
  double avg_duration_sec = 3 [json_name = "avgDurationSec"];
  // P50 会话时长（秒）
  double p50_duration_sec = 4 [json_name = "p50DurationSec"];
  // P90 会话时长（秒）
  double p90_duration_sec = 5 [json_name = "p90DurationSec"];
  // 跳出率（0-1）
  double bounce_rate = 6 [json_name = "bounceRate"];
  // 会话深度（人均事件数 = 总事件 / 会话数）
  double avg_depth = 7 [json_name = "avgDepth"];
}

// ============== 同比环比/异常检测 ==============
message AnomalyRequest {
  // 时间范围（通常取近 8+ 天以算 7 日基线）
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 事件名过滤（可选，空表示全部事件聚合）
  optional string event_name = 3 [json_name = "eventName"];
}

// 单事件/日的同比环比数据
message AnomalyPoint {
  // 事件名
  string event_name = 1 [json_name = "eventName"];
  // 统计日期（Unix 毫秒）
  int64 stat_date = 2 [json_name = "statDate"];
  // 当日 PV
  int64 pv = 3 [json_name = "pv"];
  // 当日 UV
  int64 uv = 4 [json_name = "uv"];
  // 7 日均值（基线）
  double baseline = 5 [json_name = "baseline"];
  // 环比昨日涨跌（0-1，正为涨）
  double wow_change = 6 [json_name = "wowChange"];
  // 是否异常（当日 PV < 7日均值 * 阈值，默认 0.5）
  bool is_anomaly = 7 [json_name = "isAnomaly"];
}

message AnomalyResponse {
  // 各事件/日的趋势 + 异常标记
  repeated AnomalyPoint points = 1 [json_name = "points"];
  // 异常事件数（去重）
  int64 anomaly_count = 2 [json_name = "anomalyCount"];
}

// ============== 新老用户对比 ==============
message NewVsOldRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 新用户判定天数（注册距今 N 天内算新用户，默认 7）
  optional uint32 new_user_days = 3 [json_name = "newUserDays"];
}

message NewVsOldSegment {
  // 用户类型：new 新用户 / old 老用户
  string user_type = 1 [json_name = "userType"];
  // 用户数
  int64 user_count = 2 [json_name = "userCount"];
  // 事件量
  int64 event_count = 3 [json_name = "eventCount"];
  // 付费用户数
  int64 pay_users = 4 [json_name = "payUsers"];
  // 付费率（0-1）
  double pay_rate = 5 [json_name = "payRate"];
}

message NewVsOldResponse {
  // 新/老用户各维度对比
  repeated NewVsOldSegment segments = 1 [json_name = "segments"];
}

// ============== 热门转化路径 ==============
message PathSankeyRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 返回前 N 条热门路径（默认 20）
  optional uint32 top_n = 3 [json_name = "topN"];
}

message PathBucket {
  // 事件序列（如 "view_home,add_to_cart,pay_success"）
  string event_sequence = 1 [json_name = "eventSequence"];
  // 路径出现次数
  int64 support_count = 2 [json_name = "supportCount"];
  // 走过该路径的去重用户数
  int64 unique_users = 3 [json_name = "uniqueUsers"];
  // 转化率（0-1）
  double conversion_rate = 4 [json_name = "conversionRate"];
}

message PathSankeyResponse {
  // 热门路径列表（按 support_count 降序）
  repeated PathBucket paths = 1 [json_name = "paths"];
}

// ============== 关卡/数值平衡分析 ==============
message LevelAnalysisRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 指定关卡 ID（可选，空表示全部关卡）
  optional string level_id = 3 [json_name = "levelId"];
}

// 单关分析结果
message LevelStat {
  // 关卡 ID
  string level_id = 1 [json_name = "levelId"];
  // 关卡名
  string level_name = 2 [json_name = "levelName"];
  // 尝试次数（level_start）
  int64 attempt_count = 3 [json_name = "attemptCount"];
  // 完成次数（level_finish）
  int64 finish_count = 4 [json_name = "finishCount"];
  // 失败次数（level_fail）
  int64 fail_count = 5 [json_name = "failCount"];
  // 通过率（0-1，finish / (finish+fail)）
  double pass_rate = 6 [json_name = "passRate"];
  // 卡关率（0-1，1 - passRate，值越高说明越难/流失点）
  double stuck_rate = 7 [json_name = "stuckRate"];
  // 平均分
  double avg_score = 8 [json_name = "avgScore"];
  // 满星率（0-1，context['stars']==3 占比）
  double star3_rate = 9 [json_name = "star3Rate"];
  // 挑战该关卡的玩家数（去重）
  int64 player_count = 10 [json_name = "playerCount"];
}

message LevelAnalysisResponse {
  // 各关卡统计（按 player_count 降序）
  repeated LevelStat levels = 1 [json_name = "levels"];
}

// ============== 鲸鱼用户/付费分层 ==============
message WhaleTierRequest {
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 1 [json_name = "appId"];
}

// 付费分层
message PayTierSegment {
  // 分层标识：whale 大课长 / dolphin 中课长 / minnow 小课长 / non_pay 免费
  string tier = 1 [json_name = "tier"];
  // 分层中文名
  string tier_label = 2 [json_name = "tierLabel"];
  // 该层用户数
  int64 user_count = 3 [json_name = "userCount"];
  // 占比（0-1）
  double percentage = 4 [json_name = "percentage"];
  // 该层累计充值总额
  double total_amount = 5 [json_name = "totalAmount"];
  // 该层收入贡献占比（0-1）
  double revenue_share = 6 [json_name = "revenueShare"];
  // 该层 ARPPU
  double arppu = 7 [json_name = "arppu"];
}

message WhaleTierResponse {
  // 各付费分层
  repeated PayTierSegment segments = 1 [json_name = "segments"];
  // 总用户数
  int64 total_users = 2 [json_name = "totalUsers"];
  // 总流水
  double total_revenue = 3 [json_name = "totalRevenue"];
}

// ============== 历史生命周期价值 LTV ==============
message LTVRequest {
  // 注册时间范围（按 register_time 过滤同期群）
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 归因维度（可选，按渠道分组 LTV）：channel（默认，配合归因模型）
  optional string dimension = 3 [json_name = "dimension"];
}

// 单个 LTV 数据点（某天/某维度的累计付费价值）
message LTVPoint {
  // 维度值（如渠道名，未分组时为空）
  string label = 1 [json_name = "label"];
  // 注册后第 N 天（0=注册当天）
  uint32 day_n = 2 [json_name = "dayN"];
  // 该同期群累计人均付费（LTV）
  double ltv = 3 [json_name = "ltv"];
  // 该同期群人数
  int64 cohort_size = 4 [json_name = "cohortSize"];
  // 累计付费总额
  double total_amount = 5 [json_name = "totalAmount"];
}

message LTVResponse {
  // LTV 曲线数据点（按 day_n 升序，同维度聚合）
  repeated LTVPoint points = 1 [json_name = "points"];
  // 观察的最大天数
  uint32 max_days = 2 [json_name = "maxDays"];
}

// ============== 滚服留存（按区服分组） ==============
message ServerRetentionRequest {
  // 时间范围（按首次活跃日过滤）
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 区服 ID 过滤（可选，空表示全部区服对比）
  optional string server_id = 3 [json_name = "serverId"];
  // 最大偏移天数（默认 7）
  optional uint32 max_offset_days = 4 [json_name = "maxOffsetDays"];
}

// 单区服留存
message ServerRetentionRow {
  // 区服 ID
  string server_id = 1 [json_name = "serverId"];
  // 首日新增用户数（同期群规模）
  int64 cohort_size = 2 [json_name = "cohortSize"];
  // 各偏移天的留存率（key=天数，如 "1"/"3"/"7"）
  map<string, double> retention_rates = 3 [json_name = "retentionRates"];
}

message ServerRetentionResponse {
  // 各区服留存
  repeated ServerRetentionRow rows = 1 [json_name = "rows"];
  // 偏移天列表（横轴）
  repeated uint32 offset_days = 2 [json_name = "offsetDays"];
}

// ============== 同时在线 PCU/ACU ==============
message OnlineStatsRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 区服过滤（可选）
  optional string server_id = 3 [json_name = "serverId"];
}

message OnlineStatsResponse {
  // PCU 峰值同时在线（时间段内最大同时在线数）
  int64 pcu = 1 [json_name = "pcu"];
  // ACU 平均同时在线
  int64 acu = 2 [json_name = "acu"];
  // 统计时长（分钟）
  int64 duration_minutes = 3 [json_name = "durationMinutes"];
  // 总会话数
  int64 total_sessions = 4 [json_name = "totalSessions"];
}

// ============== 经济系统/代币流向 ==============
message EconomyRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 代币类型过滤（可选，如 GOLD/DIAMOND，空表示全部）
  optional string currency = 3 [json_name = "currency"];
}

// 单代币的产出消耗平衡
message CurrencyBalance {
  // 代币类型（GOLD/DIAMOND 等）
  string currency = 1 [json_name = "currency"];
  // 产出总量（Source：充值/奖励/掉落等获取）
  double source = 2 [json_name = "source"];
  // 消耗总量（Sink：购买/升级等支出）
  double sink = 3 [json_name = "sink"];
  // 净流入（产出 - 消耗，正值=通胀倾向，负值=通缩）
  double net = 4 [json_name = "net"];
}

message EconomyResponse {
  // 各代币的产出消耗平衡
  repeated CurrencyBalance currencies = 1 [json_name = "currencies"];
}
