syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/timestamp.proto";

// 数据分析服务（BI 聚合查询）
service AnalyticsService {
  // 事件量趋势（按时间粒度分桶）
  rpc EventTrend(EventTrendRequest) returns (EventTrendResponse) {}

  // 漏斗分析
  rpc Funnel(FunnelRequest) returns (FunnelResponse) {}

  // 留存分析（同期群矩阵）
  rpc Retention(RetentionRequest) returns (RetentionResponse) {}

  // 维度分组聚合（平台/渠道/地区/版本等）
  rpc GroupBy(GroupByRequest) returns (GroupByResponse) {}

  // 活跃用户（DAU/WAU/MAU）
  rpc ActiveUsers(ActiveUsersRequest) returns (ActiveUsersResponse) {}

  // 归因分析（首触/末触渠道归因）
  rpc Attribution(AttributionRequest) returns (AttributionResponse) {}

  // 分布分析（事件时长分桶 + 分位数）
  rpc Distribution(DistributionRequest) returns (DistributionResponse) {}

  // 行为序列（指定用户的行为时间线）
  rpc BehaviorSequence(BehaviorSequenceRequest) returns (BehaviorSequenceResponse) {}

  // 用户分群/圈选（做过/未做过某事件的人群筛选）
  rpc Segmentation(SegmentationRequest) returns (SegmentationResponse) {}

  // 点击热力图（按页面网格分桶聚合点击坐标）
  rpc Click(ClickRequest) returns (ClickResponse) {}
}

// 时间粒度
enum AnalyticsGranularity {
  // 未指定（服务端按时间跨度自动选择）
  ANALYTICS_GRANULARITY_UNSPECIFIED = 0;
  // 小时
  HOUR = 1;
  // 天
  DAY = 2;
  // 周
  WEEK = 3;
  // 月
  MONTH = 4;
}

// 时间范围（毫秒时间戳，start/end 均含端点）
message TimeRange {
  // 起始时间（含），Unix 毫秒
  int64 start_ms = 1 [
    json_name = "startMs",
    (gnostic.openapi.v3.property) = {description: "起始时间（含），Unix 毫秒"}
  ];
  // 结束时间（含），Unix 毫秒
  int64 end_ms = 2 [
    json_name = "endMs",
    (gnostic.openapi.v3.property) = {description: "结束时间（含），Unix 毫秒"}
  ];
}

// 时间序列中的一个数据点
message TimeSeriesPoint {
  // 时间桶起点（Unix 毫秒）
  int64 timestamp = 1 [
    json_name = "timestamp",
    (gnostic.openapi.v3.property) = {description: "时间桶起点，Unix 毫秒"}
  ];
  // 数值
  double value = 2 [
    json_name = "value",
    (gnostic.openapi.v3.property) = {description: "数值"}
  ];
}

// ============== 事件趋势 ==============
message EventTrendRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 时间粒度
  AnalyticsGranularity granularity = 2 [json_name = "granularity"];
  // 应用 ID 过滤（可选，0 表示全部）
  optional uint32 app_id = 3 [json_name = "appId"];
  // 事件名过滤（可选，空表示全部事件）
  optional string event_name = 4 [json_name = "eventName"];
  // 平台过滤（可选）
  optional string platform = 5 [json_name = "platform"];
}

message EventTrendResponse {
  // 趋势数据点
  repeated TimeSeriesPoint points = 1 [json_name = "points"];
  // 时间粒度（服务端实际使用的粒度，可能因 UNSPECIFIED 而自动选择）
  AnalyticsGranularity granularity = 2 [json_name = "granularity"];
  // 区间内事件总量
  int64 total = 3 [json_name = "total"];
}

// ============== 漏斗分析 ==============
message FunnelStep {
  // 步骤序号（从 1 开始）
  uint32 step_index = 1 [json_name = "stepIndex"];
  // 该步骤的事件名
  string event_name = 2 [json_name = "eventName"];
  // 完成该步骤的事件数
  int64 count = 3 [json_name = "count"];
  // 相对上一步的转化率（0-1，首步为 1）
  double conversion_rate = 4 [json_name = "conversionRate"];
  // 相对首步的整体转化率（0-1，首步为 1）
  double overall_rate = 5 [json_name = "overallRate"];
}

message FunnelRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 漏斗步骤事件名（有序，至少 2 步）
  repeated string steps = 2 [json_name = "steps"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
  // 转化窗口（毫秒，用户必须在窗口内完成全部步骤，默认 30 分钟）
  optional int64 window_ms = 4 [json_name = "windowMs"];
}

message FunnelResponse {
  // 各步骤结果
  repeated FunnelStep steps = 1 [json_name = "steps"];
  // 完成全部步骤的用户数
  int64 completed_users = 2 [json_name = "completedUsers"];
  // 进入首步的用户数
  int64 entered_users = 3 [json_name = "enteredUsers"];
  // 整体转化率
  double overall_conversion = 4 [json_name = "overallConversion"];
}

// ============== 留存分析 ==============
message RetentionCell {
  // 相对注册/首次活跃的天数偏移（0 = 当天）
  uint32 offset_days = 1 [json_name = "offsetDays"];
  // 该偏移的活跃用户数
  int64 count = 2 [json_name = "count"];
  // 留存率（0-1）
  double rate = 3 [json_name = "rate"];
}

message RetentionCohort {
  // 同期群日期（Unix 毫秒，当天 0 点）
  int64 cohort_date = 1 [json_name = "cohortDate"];
  // 该同期群规模（首日用户数）
  int64 size = 2 [json_name = "size"];
  // 各偏移天的留存
  repeated RetentionCell cells = 3 [json_name = "cells"];
}

message RetentionRequest {
  // 时间范围（按 cohort_date 过滤）
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 2 [json_name = "appId"];
  // 留存类型：ACTIVE=活跃留存（默认），EVENT=指定事件留存
  optional string retention_type = 3 [json_name = "retentionType"];
  // 当 retention_type=EVENT 时指定事件名
  optional string event_name = 4 [json_name = "eventName"];
  // 最大偏移天数（默认 7）
  optional uint32 max_offset_days = 5 [json_name = "maxOffsetDays"];
}

message RetentionResponse {
  // 同期群列表
  repeated RetentionCohort cohorts = 1 [json_name = "cohorts"];
  // 所有偏移天列表（横轴）
  repeated uint32 offset_days = 2 [json_name = "offsetDays"];
}

// ============== 维度分组聚合 ==============
message GroupByRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 分组维度字段名（如 platform/channel/country/app_version/event_name）
  string dimension = 2 [json_name = "dimension"];
  // 聚合指标：COUNT=事件数(默认)，UNIQUE_USER=去重用户数，SUM_AMOUNT=金额求和
  optional string metric = 3 [json_name = "metric"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 4 [json_name = "appId"];
  // 事件名过滤（可选）
  optional string event_name = 5 [json_name = "eventName"];
  // 返回前 N 个分组（默认 20）
  optional uint32 top_n = 6 [json_name = "topN"];
}

message GroupByBucket {
  // 分组标签（维度值）
  string label = 1 [json_name = "label"];
  // 聚合数值
  double value = 2 [json_name = "value"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

message GroupByResponse {
  // 各分组结果
  repeated GroupByBucket buckets = 1 [json_name = "buckets"];
  // 维度字段名
  string dimension = 2 [json_name = "dimension"];
  // 总量
  double total = 3 [json_name = "total"];
}

// ============== 活跃用户 ==============
message ActiveUsersRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 时间粒度（DAU 按粒度分桶，同时给出 WAU/MAU 累计）
  AnalyticsGranularity granularity = 2 [json_name = "granularity"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
}

message ActiveUsersPoint {
  // 时间桶起点（Unix 毫秒）
  int64 timestamp = 1 [json_name = "timestamp"];
  // 日活
  int64 dau = 2 [json_name = "dau"];
  // 周活（滚动 7 天）
  int64 wau = 3 [json_name = "wau"];
  // 月活（滚动 30 天）
  int64 mau = 4 [json_name = "mau"];
}

message ActiveUsersResponse {
  // 各时间桶的活跃用户数据
  repeated ActiveUsersPoint points = 1 [json_name = "points"];
  // 最新一天的 DAU
  int64 latest_dau = 2 [json_name = "latestDau"];
}

// ============== 归因分析 ==============
message AttributionRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 转化事件名（如 pay_success）
  string conversion_event = 2 [json_name = "conversionEvent"];
  // 归因维度：channel 渠道（默认）/ referer 来源页
  optional string dimension = 3 [json_name = "dimension"];
  // 归因模型：last_touch 末次触达（默认）/ first_touch 首次触达
  optional string model = 4 [json_name = "model"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 5 [json_name = "appId"];
}

message AttributionBucket {
  // 归因维度值（渠道/来源页）
  string label = 1 [json_name = "label"];
  // 该触点的转化用户数（去重）
  int64 converter_uv = 2 [json_name = "converterUv"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

message AttributionResponse {
  // 各触点的归因贡献
  repeated AttributionBucket buckets = 1 [json_name = "buckets"];
  // 使用的归因模型
  string model = 2 [json_name = "model"];
  // 使用的归因维度
  string dimension = 3 [json_name = "dimension"];
  // 转化用户总数
  int64 total_converters = 4 [json_name = "totalConverters"];
}

// ============== 分布分析 ==============
message DistributionRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 目标事件名（如 page_view）
  string event_name = 2 [json_name = "eventName"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
}

// 分布分析分桶
message DistributionBucket {
  // 分桶标签（如 0_10s / 10_60s / 1_5min / 5min_plus）
  string bucket = 1 [json_name = "bucket"];
  // 该桶事件数
  int64 count = 2 [json_name = "count"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

// 分布分析分位数摘要
message DistributionSummary {
  // 平均时长（秒）
  double avg_sec = 1 [json_name = "avgSec"];
  // P50（中位数，秒）
  double p50_sec = 2 [json_name = "p50Sec"];
  // P90（秒）
  double p90_sec = 3 [json_name = "p90Sec"];
  // 最大值（秒）
  double max_sec = 4 [json_name = "maxSec"];
  // 总事件数
  int64 count = 5 [json_name = "count"];
}

message DistributionResponse {
  // 各分桶分布
  repeated DistributionBucket buckets = 1 [json_name = "buckets"];
  // 分位数摘要
  DistributionSummary summary = 2 [json_name = "summary"];
}

// ============== 行为序列 ==============
message BehaviorSequenceRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 用户 ID
  uint32 user_id = 2 [json_name = "userId"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 3 [json_name = "appId"];
  // 事件名过滤（可选，空表示全部事件）
  optional string event_name = 4 [json_name = "eventName"];
  // 最多返回事件数（默认 100）
  optional uint32 limit = 5 [json_name = "limit"];
}

// 序列中的一个行为事件
message SequenceEvent {
  // 事件时间（Unix 毫秒）
  int64 timestamp = 1 [json_name = "timestamp"];
  // 事件名
  string event_name = 2 [json_name = "eventName"];
  // 会话 ID
  optional string session_id = 3 [json_name = "sessionId"];
  // 会话内序号
  optional uint32 session_seq = 4 [json_name = "sessionSeq"];
  // 来源页
  optional string referer = 5 [json_name = "referer"];
  // 平台
  optional string platform = 6 [json_name = "platform"];
  // 渠道
  optional string channel = 7 [json_name = "channel"];
}

message BehaviorSequenceResponse {
  // 用户 ID
  uint32 user_id = 1 [json_name = "userId"];
  // 按时间升序排列的行为事件
  repeated SequenceEvent events = 2 [json_name = "events"];
}

// ============== 用户分群/圈选 ==============
// 单个圈选条件
message SegmentCondition {
  // 事件名
  string event_name = 1 [json_name = "eventName"];
  // 至少触发次数（默认 1，即"做过"）
  optional uint32 min_times = 2 [json_name = "minTimes"];
}

message SegmentationRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 必须做过的事件（满足任一即纳入人群的"做过"集合）
  repeated SegmentCondition include = 2 [json_name = "include"];
  // 必须未做过的事件（做过任一即排除）
  repeated SegmentCondition exclude = 3 [json_name = "exclude"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 4 [json_name = "appId"];
  // 最多返回用户数（默认 5000）
  optional uint32 limit = 5 [json_name = "limit"];
}

message SegmentationResponse {
  // 命中的用户 ID 列表
  repeated uint32 user_ids = 1 [json_name = "userIds"];
  // 命中用户总数
  int64 total = 2 [json_name = "total"];
}

// ============== 点击热力图 ==============
message ClickRequest {
  // 时间范围
  TimeRange time_range = 1 [json_name = "timeRange"];
  // 页面 URL（必填，按页面分组热力图）
  string page_url = 2 [json_name = "pageUrl"];
  // 网格大小（像素，默认 20）
  optional uint32 grid_size = 3 [json_name = "gridSize"];
  // 应用 ID 过滤（可选）
  optional uint32 app_id = 4 [json_name = "appId"];
}

// 热力图网格点
message ClickHeatPoint {
  // 网格左上角 X（像素）
  uint32 x = 1 [json_name = "x"];
  // 网格左上角 Y（像素）
  uint32 y = 2 [json_name = "y"];
  // 该网格的点击次数
  int64 count = 3 [json_name = "count"];
  // 热度（0-1，相对最大点击数的归一化值）
  double intensity = 4 [json_name = "intensity"];
}

// 元素点击 TOP（按 element_xpath 聚合）
message ClickElementBucket {
  // 元素 XPath
  string element_xpath = 1 [json_name = "elementXpath"];
  // 点击次数
  int64 count = 2 [json_name = "count"];
  // 占比（0-1）
  double percentage = 3 [json_name = "percentage"];
}

message ClickResponse {
  // 热力图网格点列表
  repeated ClickHeatPoint points = 1 [json_name = "points"];
  // 元素点击 TOP
  repeated ClickElementBucket top_elements = 2 [json_name = "topElements"];
  // 总点击次数
  int64 total_clicks = 3 [json_name = "totalClicks"];
  // 使用的网格大小
  uint32 grid_size = 4 [json_name = "gridSize"];
}
