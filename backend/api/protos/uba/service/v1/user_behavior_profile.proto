syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/empty.proto";

import "pagination/v1/pagination.proto";

import "uba/service/v1/common.proto";

// 用户画像服务
service UserBehaviorProfileService {
  // 查询用户画像列表
  rpc List (pagination.PagingRequest) returns (ListUserBehaviorProfileResponse) {}

  // 查询用户画像详情
  rpc Get (GetUserBehaviorProfileRequest) returns (UserBehaviorProfile) {}

  // 创建用户画像
  rpc Create (UserBehaviorProfile) returns (google.protobuf.Empty) {}

  // 批量创建用户画像
  rpc BatchCreate (BatchCreateUserBehaviorProfileRequest) returns (google.protobuf.Empty) {}
}

// 用户画像（对应 users_dim 表）
message UserBehaviorProfile {
  // 自增长主键ID
  optional uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "自增长主键ID，唯一标识一条用户画像记录"}
  ];

  uint32 tenant_id = 2 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID"}
  ]; // 租户ID
  uint32 user_id = 3 [
    json_name = "userId",
    (gnostic.openapi.v3.property) = {description: "用户ID"}
  ]; // 用户ID

  // 基础属性
  google.protobuf.Timestamp register_time = 5 [
    json_name = "registerTime",
    (gnostic.openapi.v3.property) = {description: "注册时间"}
  ]; // 注册时间
  string register_channel = 6 [
    json_name = "registerChannel",
    (gnostic.openapi.v3.property) = {description: "注册渠道"}
  ]; // 注册渠道
  google.protobuf.Timestamp first_active_date = 7 [
    json_name = "firstActiveDate",
    (gnostic.openapi.v3.property) = {description: "首次活跃日期"}
  ]; // 首次活跃日期
  google.protobuf.Timestamp last_active_date = 8 [
    json_name = "lastActiveDate",
    (gnostic.openapi.v3.property) = {description: "最后活跃日期"}
  ]; // 最后活跃日期

  // 身份属性
  uint32 user_level = 9 [
    json_name = "userLevel",
    (gnostic.openapi.v3.property) = {description: "用户等级"}
  ]; // 用户等级
  uint32 vip_level = 10 [
    json_name = "vipLevel",
    (gnostic.openapi.v3.property) = {description: "VIP等级"}
  ]; // VIP等级
  string user_role = 11 [
    json_name = "userRole",
    (gnostic.openapi.v3.property) = {description: "用户角色"}
  ]; // 用户角色

  // 行为画像
  uint64 total_events = 12 [
    json_name = "totalEvents",
    (gnostic.openapi.v3.property) = {description: "总事件数"}
  ]; // 总事件数
  uint32 total_sessions = 13 [
    json_name = "totalSessions",
    (gnostic.openapi.v3.property) = {description: "总会话数"}
  ]; // 总会话数
  string total_pay_amount = 14 [
    json_name = "totalPayAmount",
    (gnostic.openapi.v3.property) = {description: "总支付金额"}
  ]; // 总支付金额
  google.protobuf.Timestamp last_pay_time = 15 [
    json_name = "lastPayTime",
    (gnostic.openapi.v3.property) = {description: "最后支付时间"}
  ]; // 最后支付时间

  // 偏好标签
  repeated string prefer_categories = 16 [
    json_name = "preferCategories",
    (gnostic.openapi.v3.property) = {description: "偏好类别"}
  ]; // 偏好类别
  repeated string prefer_objects = 17 [
    json_name = "preferObjects",
    (gnostic.openapi.v3.property) = {description: "偏好对象"}
  ]; // 偏好对象

  // 风险画像
  uint32 risk_score = 20 [
    json_name = "riskScore",
    (gnostic.openapi.v3.property) = {description: "风险评分"}
  ]; // 风险评分
  repeated string risk_tags = 21 [
    json_name = "riskTags",
    (gnostic.openapi.v3.property) = {description: "风险标签"}
  ]; // 风险标签
  // 风险等级
  optional RiskLevel risk_level = 22 [
    json_name = "riskLevel",
    (gnostic.openapi.v3.property) = {description: "风险等级，枚举类型，标识用户当前的风险级别"}
  ]; // 风险等级，枚举类型，标识用户当前的风险级别
  // 最后风险时间
  optional google.protobuf.Timestamp last_risk_time = 23 [
    json_name = "lastRiskTime",
    (gnostic.openapi.v3.property) = {description: "最后风险时间，记录用户最近一次风险事件发生的时间"}
  ]; // 最后风险时间，记录用户最近一次风险事件发生的时间

  // 扩展属性
  map<string, string> profile = 30 [
    json_name = "profile",
    (gnostic.openapi.v3.property) = {description: "扩展属性"}
  ]; // 扩展属性

  // 地理位置
  map<string, string> geo = 40 [
    json_name = "geo",
    (gnostic.openapi.v3.property) = {description: "地理位置，经纬度信息或 GeoJSON，便于分析用户地理分布"}
  ]; // 地理位置，经纬度信息或 GeoJSON，便于分析用户地理分布

  // 平台类型
  optional Platform platform = 41 [
    json_name = "platform",
    (gnostic.openapi.v3.property) = {description: "平台类型，枚举类型，标识用户主要活跃的平台（如 Web、iOS、Android 等）"}
  ]; // 平台类型，枚举类型，标识用户主要活跃的平台（如 Web、iOS、Android 等）

  // 设备类型
  optional string device_type = 42 [
    json_name = "deviceType",
    (gnostic.openapi.v3.property) = {description: "设备类型，记录用户主要使用的设备类型（如手机、平板、PC 等）"}
  ]; // 设备类型，记录用户主要使用的设备类型（如手机、平板、PC 等）

  uint64 ver = 50 [
    json_name = "ver",
    (gnostic.openapi.v3.property) = {description: "版本号"}
  ]; // 版本号

  optional google.protobuf.Timestamp created_at = 100 [json_name = "createdAt", (gnostic.openapi.v3.property) = {description: "创建时间"}];// 创建时间
  optional google.protobuf.Timestamp updated_at = 101 [json_name = "updatedAt", (gnostic.openapi.v3.property) = {description: "更新时间"}];// 更新时间
}

// 获取用户画像列表 - 答复
message ListUserBehaviorProfileResponse {
  repeated UserBehaviorProfile items = 1;
  uint64 total = 2;
}

// 获取用户画像数据 - 请求
message GetUserBehaviorProfileRequest {
  oneof query_by {
    uint32 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {
      description: "视图字段过滤器，用于控制返回的字段"
    }
  ]; // 视图字段过滤器，用于控制返回的字段
}

// 创建用户画像 - 请求
message CreateUserBehaviorProfileRequest {
  UserBehaviorProfile data = 1;
}
message BatchCreateUserBehaviorProfileRequest {
  repeated UserBehaviorProfile items = 1;
}

// 更新用户画像 - 请求
message UpdateUserBehaviorProfileRequest {
  uint32 id = 1;

  UserBehaviorProfile data = 2 [
    json_name = "data",
    (gnostic.openapi.v3.property) = {description: "用户的数据"}
  ]; // 用户的数据

  google.protobuf.FieldMask update_mask = 4 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {
      description: "要更新的字段列表",
      example: {yaml : "id,realname,username"}
    }
  ]; // 要更新的字段列表

  optional bool allow_missing = 5 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。"}
  ]; // 如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。
}

// 删除用户画像 - 请求
message DeleteUserBehaviorProfileRequest {
  oneof query_by {
    uint32 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional uint32 deleted_by = 100 [
    json_name = "deletedBy",
    (gnostic.openapi.v3.property) = {description: "删除者用户ID"}
  ]; // 删除者用户ID
}
