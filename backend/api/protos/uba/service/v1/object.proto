syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";

import "pagination/v1/pagination.proto";

// 对象维度服务
service ObjectService {
  // 查询对象维度列表
  rpc List (pagination.PagingRequest) returns (ListObjectDimResponse) {}

  // 查询对象维度详情
  rpc Get (GetObjectDimRequest) returns (ObjectDim) {}

  // 创建对象维度
  rpc Create (CreateObjectDimRequest) returns (ObjectDim) {}
}

// 对象维度（对应 objects_dim 表）
message ObjectDim {
  // 自增长主键ID
  uint32 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "自增长主键ID，唯一标识一条对象维度记录"}
  ];

  // 租户ID（多租户隔离，支持 SaaS 场景）
  uint32 tenant_id = 2 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID，多租户隔离，支持 SaaS 场景"}
  ];

  // 对象类型（如商品、道具、内容等）
  string object_type = 3 [
    json_name = "objectType",
    (gnostic.openapi.v3.property) = {description: "对象类型，如商品、道具、内容等"}
  ];

  // 对象ID（唯一标识一个对象）
  string object_id = 4 [
    json_name = "objectId",
    (gnostic.openapi.v3.property) = {description: "对象ID，唯一标识一个对象"}
  ];

  // 对象名称（对象的显示名称）
  string object_name = 5 [
    json_name = "objectName",
    (gnostic.openapi.v3.property) = {description: "对象名称，对象的显示名称"}
  ];

  // 分类路径（对象所属的分类层级路径）
  string category_path = 6 [
    json_name = "categoryPath",
    (gnostic.openapi.v3.property) = {description: "分类路径，对象所属的分类层级路径"}
  ];

  // 价格（对象的价格，字符串类型，支持多币种格式）
  string price = 7 [
    json_name = "price",
    (gnostic.openapi.v3.property) = {description: "价格，对象的价格，字符串类型，支持多币种格式"}
  ];

  // 币种（对象价格的币种，如 CNY、USD 等）
  string currency = 8 [
    json_name = "currency",
    (gnostic.openapi.v3.property) = {description: "币种，对象价格的币种，如 CNY、USD 等"}
  ];

  // 稀有度（对象的稀有等级，如普通、稀有、史诗等）
  string rarity = 9 [
    json_name = "rarity",
    (gnostic.openapi.v3.property) = {description: "稀有度，对象的稀有等级，如普通、稀有、史诗等"}
  ];

  // 属性（对象的扩展属性，键值对形式，支持自定义属性）
  map<string, string> attributes = 10 [
    json_name = "attributes",
    (gnostic.openapi.v3.property) = {description: "属性，对象的扩展属性，键值对形式，支持自定义属性"}
  ];

  // 状态（对象当前状态，如上架、下架、有效、无效等）
  string status = 11 [
    json_name = "status",
    (gnostic.openapi.v3.property) = {description: "状态，对象当前状态，如上架、下架、有效、无效等"}
  ];

  // 有效期起始时间（对象有效期的开始时间）
  google.protobuf.Timestamp valid_from = 12 [
    json_name = "validFrom",
    (gnostic.openapi.v3.property) = {description: "有效期起始时间，对象有效期的开始时间"}
  ];

  // 有效期结束时间（对象有效期的结束时间）
  google.protobuf.Timestamp valid_to = 13 [
    json_name = "validTo",
    (gnostic.openapi.v3.property) = {description: "有效期结束时间，对象有效期的结束时间"}
  ];

  // 创建者用户ID（记录创建该对象的用户）
  optional uint32 created_by = 100 [
    json_name = "createdBy",
    (gnostic.openapi.v3.property) = {description: "创建者用户ID，记录创建该对象的用户"}
  ];

  // 更新者用户ID（记录最近一次更新该对象的用户）
  optional uint32 updated_by = 101 [
    json_name = "updatedBy",
    (gnostic.openapi.v3.property) = {description: "更新者用户ID，记录最近一次更新该对象的用户"}
  ];

  // 删除者用户ID（记录删除该对象的用户）
  optional uint32 deleted_by = 102 [
    json_name = "deletedBy",
    (gnostic.openapi.v3.property) = {description: "删除者用户ID，记录删除该对象的用户"}
  ];

  optional google.protobuf.Timestamp created_at = 200 [json_name = "createdAt", (gnostic.openapi.v3.property) = {description: "创建时间"}];// 创建时间
  optional google.protobuf.Timestamp updated_at = 201 [json_name = "updatedAt", (gnostic.openapi.v3.property) = {description: "更新时间"}];// 更新时间
  optional google.protobuf.Timestamp deleted_at = 202 [json_name = "deletedAt", (gnostic.openapi.v3.property) = {description: "删除时间"}];// 删除时间
}

// 获取对象维度列表 - 答复
message ListObjectDimResponse {
  repeated ObjectDim items = 1;
  uint64 total = 2;
}

// 获取对象维度数据 - 请求
message GetObjectDimRequest {
  oneof query_by {
    uint32 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {
      description: "视图字段过滤器，用于控制返回的字段"
    }
  ]; // 视图字段过滤器，用于控制返回的字段
}

// 创建对象维度 - 请求
message CreateObjectDimRequest {
  ObjectDim data = 1;
}

// 更新对象维度 - 请求
message UpdateObjectDimRequest {
  uint32 id = 1;

  ObjectDim data = 2 [
    json_name = "data",
    (gnostic.openapi.v3.property) = {description: "数据"}
  ]; // 数据

  google.protobuf.FieldMask update_mask = 3 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {
      description: "要更新的字段列表",
      example: {yaml : "id,realname,username"}
    }
  ]; // 要更新的字段列表

  optional bool allow_missing = 4 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。"}
  ]; // 如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。
}

// 删除对象维度 - 请求
message DeleteObjectDimRequest {
  oneof query_by {
    uint32 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional uint32 deleted_by = 100 [
    json_name = "deletedBy",
    (gnostic.openapi.v3.property) = {description: "删除者用户ID"}
  ]; // 删除者用户ID
}
