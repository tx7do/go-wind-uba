syntax = "proto3";

package uba.service.v1;

// 事件分类（用于标识事件所属的业务类型）
enum EventCategory {
  // 未指定事件分类
  EVENT_CATEGORY_UNSPECIFIED = 0;

  // 认证相关事件
  EVENT_CATEGORY_AUTH = 1;
  // 支付相关事件
  EVENT_CATEGORY_PAY = 2;
  // 游戏相关事件
  EVENT_CATEGORY_GAME = 3;
  // 内容相关事件
  EVENT_CATEGORY_CONTENT = 4;
  // 安全相关事件
  EVENT_CATEGORY_SECURITY = 5;
  // 系统相关事件
  EVENT_CATEGORY_SYSTEM = 6;
}

// 平台类型（用于标识应用或事件发生的平台）
enum Platform {
  // 未指定平台类型
  PLATFORM_UNSPECIFIED = 0;

  // Web 平台
  WEB = 1;
  // iOS 平台
  IOS = 2;
  // Android 平台
  ANDROID = 3;
  // Windows 平台
  WINDOWS = 4;
  // macOS 平台
  MACOS = 5;
  // Linux 平台
  LINUX = 6;
  // 小程序平台
  MINI_PROGRAM = 7;
  // H5平台
  H5 = 8;
}

// 操作结果（用于标识操作的执行结果状态）
enum OpResult {
  // 未指定操作结果
  OP_RESULT_UNSPECIFIED = 0;

  // 操作成功
  OP_RESULT_SUCCESS = 1;
  // 操作失败
  OP_RESULT_FAILED = 2;
  // 操作超时
  OP_RESULT_TIMEOUT = 3;
  // 操作部分成功
  OP_RESULT_PARTIAL = 4;
}

// 风险等级（用于标识事件或用户的风险级别）
enum RiskLevel {
  // 未指定风险等级
  RISK_LEVEL_UNSPECIFIED = 0;

  // 正常风险
  RISK_LEVEL_NORMAL = 1;
  // 可疑风险
  RISK_LEVEL_SUSPICIOUS = 2;
  // 高风险
  RISK_LEVEL_HIGH = 3;
  // 危急风险
  RISK_LEVEL_CRITICAL = 4;
}

// 风险等级
enum RiskType {
  // 未指定风险类型
  RISK_TYPE_UNSPECIFIED = 0;

  // 异常登录风险
  RISK_TYPE_LOGIN_ANOMALY = 1;
  // 暴力破解风险
  RISK_TYPE_BRUTE_FORCE = 2;
  // 撞库风险
  RISK_TYPE_CREDENTIAL_STUFFING = 3;

  // 高频操作风险
  RISK_TYPE_FREQUENT_OPERATION = 4;
  // 异常流程风险
  RISK_TYPE_ABNORMAL_FLOW = 5;
  // 数据泄露风险
  RISK_TYPE_DATA_EXFILTRATION = 6;

  // 设备突变风险
  RISK_TYPE_DEVICE_CHANGE = 7;
  // 异地登录风险
  RISK_TYPE_LOCATION_ANOMALY = 8;
  // 代理/VPN风险
  RISK_TYPE_PROXY_DETECTED = 9;

  // 欺诈支付风险
  RISK_TYPE_FRAUD_PAYMENT = 10;
  // 薅羊毛风险
  RISK_TYPE_ABUSE_PROMOTION = 11;
}
