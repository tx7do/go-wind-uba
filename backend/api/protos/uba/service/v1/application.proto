syntax = "proto3";

package uba.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";

import "pagination/v1/pagination.proto";

import "uba/service/v1/common.proto";

// UBA应用服务
service ApplicationService {
  // 查询UBA应用列表
  rpc List (pagination.PagingRequest) returns (ListApplicationResponse) {}

  // 查询UBA应用数量
  rpc Count (pagination.PagingRequest) returns (CountApplicationResponse) {}

  // 查询UBA应用详情
  rpc Get (GetApplicationRequest) returns (Application) {}

  // 创建UBA应用
  rpc Create (CreateApplicationRequest) returns (Application) {}

  // 更新UBA应用
  rpc Update (UpdateApplicationRequest) returns (Application) {}

  // 删除UBA应用
  rpc Delete (DeleteApplicationRequest) returns (google.protobuf.Empty) {}
}

// UBA应用
message Application {
  // 应用状态
  enum Status {
    STATUS_UNSPECIFIED = 0;

    ON = 1;
    OFF = 2;
  }

  // 应用类型
  enum Type {
    APPLICATION_TYPE_UNSPECIFIED = 0;

    GAME = 1;       // 游戏
    ECOMMERCE = 2;  // 电商
    CONTENT = 3;    // 内容
    TOOL = 4;       // 工具
    FINANCE = 5;    // 金融
    SOCIAL = 6;     // 社交
    EDUCATION = 7;  // 教育
    OTHER = 8;      // 其他
  }

  // 内部主键（数据库使用，不对外暴露）
  uint32 id = 1 [
    (gnostic.openapi.v3.property) = { description: "ID" }
  ]; // ID

  optional string name = 2 [
    (gnostic.openapi.v3.property) = { description: "UBA应用名称" }
  ]; // UBA应用名称

  // 业务唯一标识（对外使用，上报/回调/配置都用它）
  optional string app_id = 3 [
    json_name = "appId",
    (gnostic.openapi.v3.property) = { description: "应用唯一标识（上报/回调/配置时使用，如'game_001'）" }
  ]; // UBA应用唯一标识（上报时使用）
  optional string app_key = 4 [
    json_name = "appKey",
    (gnostic.openapi.v3.property) = { description: "应用Key" }
  ]; // 应用Key
  optional string app_secret = 5 [
    json_name = "appSecret",
    (gnostic.openapi.v3.property) = { description: "应用密钥" }
  ]; // 应用密钥

  optional Type type = 6 [(gnostic.openapi.v3.property) = {
    description: "应用类型"
  }]; // 应用类型

  // 支持平台列表
  repeated string platforms = 7 [
    (gnostic.openapi.v3.property) = { description: "应用支持的平台列表" }
  ];

  optional Status status = 8 [(gnostic.openapi.v3.property) = {
    description: "应用状态"
    default: { string: "ON" }
  }]; // 应用状态

  optional string remark = 9 [
    (gnostic.openapi.v3.property) = { description: "备注信息" }
  ]; // 备注信息

  optional bool desensitize = 10 [
    (gnostic.openapi.v3.property) = { description: "是否开启脱敏" }
  ]; // 是否开启脱敏

  optional string webhook_url = 11 [
    json_name = "webhookUrl",
    (gnostic.openapi.v3.property) = {description: "事件回调 URL"}
  ];  // 事件回调 URL
  optional string webhook_secret = 12 [
    json_name = "webhookSecret",
    (gnostic.openapi.v3.property) = {description: "回调签名密钥"}
  ];  // 回调签名密钥

  optional uint32 tenant_id = 20 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID"}
  ];  // 租户ID
  optional string tenant_name = 21 [
    json_name = "tenantName",
    (gnostic.openapi.v3.property) = {description: "租户名称"}
  ];  // 租户名称

  optional uint32 created_by = 100 [json_name = "createdBy", (gnostic.openapi.v3.property) = {description: "创建者用户ID"}]; // 创建者用户ID
  optional uint32 updated_by = 101 [json_name = "updatedBy", (gnostic.openapi.v3.property) = {description: "更新者用户ID"}]; // 更新者用户ID
  optional uint32 deleted_by = 102 [json_name = "deletedBy", (gnostic.openapi.v3.property) = {description: "删除者用户ID"}]; // 删除者用户ID

  optional google.protobuf.Timestamp created_at = 200 [json_name = "createdAt", (gnostic.openapi.v3.property) = {description: "创建时间"}];// 创建时间
  optional google.protobuf.Timestamp updated_at = 201 [json_name = "updatedAt", (gnostic.openapi.v3.property) = {description: "更新时间"}];// 更新时间
  optional google.protobuf.Timestamp deleted_at = 202 [json_name = "deletedAt", (gnostic.openapi.v3.property) = {description: "删除时间"}];// 删除时间
}

// 获取UBA应用列表 - 答复
message ListApplicationResponse {
  repeated Application items = 1;
  uint64 total = 2;
}

// 获取UBA应用数据 - 请求
message GetApplicationRequest {
  oneof query_by {
    uint32 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID

    string app_id = 2 [
      (gnostic.openapi.v3.property) = {description: "应用ID", read_only: true},
      json_name = "appId"
    ]; // 应用ID
  }

  optional google.protobuf.FieldMask view_mask = 100 [
    json_name = "viewMask",
    (gnostic.openapi.v3.property) = {
      description: "视图字段过滤器，用于控制返回的字段"
    }
  ]; // 视图字段过滤器，用于控制返回的字段
}

// 创建UBA应用 - 请求
message CreateApplicationRequest {
  Application data = 1;
}

// 更新UBA应用 - 请求
message UpdateApplicationRequest {
  uint32 id = 1;

  Application data = 2 [
    json_name = "data",
    (gnostic.openapi.v3.property) = {description: "数据"}
  ]; // 数据

  google.protobuf.FieldMask update_mask = 3 [
    json_name = "updateMask",
    (gnostic.openapi.v3.property) = {
      description: "要更新的字段列表",
      example: {yaml : "id,realname,username"}
    }
  ]; // 要更新的字段列表

  optional bool allow_missing = 4 [
    json_name = "allowMissing",
    (gnostic.openapi.v3.property) = {description: "如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。"}
  ]; // 如果设置为true的时候，资源不存在则会新增(插入)，并且在这种情况下`updateMask`字段将会被忽略。
}

// 删除UBA应用 - 请求
message DeleteApplicationRequest {
  oneof query_by {
    uint32 id = 1 [
      (gnostic.openapi.v3.property) = {description: "ID", read_only: true},
      json_name = "id"
    ]; // ID
  }

  optional uint32 deleted_by = 100 [
    json_name = "deletedBy",
    (gnostic.openapi.v3.property) = {description: "删除者用户ID"}
  ]; // 删除者用户ID
}

message CountApplicationResponse {
  uint64 count = 1;
}
