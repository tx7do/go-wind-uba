version: v2

clean: false

managed:
  enabled: true

  disable:
    - module: buf.build/googleapis/googleapis
    - module: 'buf.build/envoyproxy/protoc-gen-validate'
    - module: 'buf.build/kratos/apis'
    - module: 'buf.build/gnostic/gnostic'
    - module: 'buf.build/gogo/protobuf'
    - module: 'buf.build/tx7do/pagination'
    - module: 'buf.build/menta2k-org/redact'
    - module: 'buf.build/srikrsna/protoc-gen-gotag'

  override:
    # global go_package_prefix option
    # 如果没有在各目录下单独配置go_package，则会使用该前缀。
    - file_option: go_package_prefix
      value: go-wind-uba/api/gen/go

    # per-directory go_package options
    # value第一部分是生成代码的包路径，第二部分是go包名。
    - file_option: go_package
      path: admin/service/v1
      value: go-wind-uba/api/gen/go/admin/service/v1;adminpb
    - file_option: go_package
      path: audit/service/v1
      value: go-wind-uba/api/gen/go/audit/service/v1;auditpb
    - file_option: go_package
      path: authentication/service/v1
      value: go-wind-uba/api/gen/go/authentication/service/v1;authenticationpb
    - file_option: go_package
      path: dict/service/v1
      value: go-wind-uba/api/gen/go/dict/service/v1;dictpb
    - file_option: go_package
      path: storage/service/v1
      value: go-wind-uba/api/gen/go/storage/service/v1;storagepb
    - file_option: go_package
      path: internal_message/service/v1
      value: go-wind-uba/api/gen/go/internal_message/service/v1;internalmessagepb
    - file_option: go_package
      path: permission/service/v1
      value: go-wind-uba/api/gen/go/permission/service/v1;permissionpb
    - file_option: go_package
      path: task/service/v1
      value: go-wind-uba/api/gen/go/task/service/v1;taskpb
    - file_option: go_package
      path: identity/service/v1
      value: go-wind-uba/api/gen/go/identity/service/v1;identitypb
    - file_option: go_package
      path: resource/service/v1
      value: go-wind-uba/api/gen/go/resource/service/v1;resourcepb
    - file_option: go_package
      path: uba/service/v1
      value: go-wind-uba/api/gen/go/uba/service/v1;ubapb

plugins:
  # generate code with custom tags
  - local: protoc-gen-gotag
    out: .
    opt:
      - paths=source_relative # use relative paths
      - outdir=./gen/go
