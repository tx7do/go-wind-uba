    description: UBA 埋点服务 API
    version: "1.0"
paths:
    /uba/v1/health:
        get:
            tags:
                - ReportService
            description: 健康检查
            operationId: ReportService_HealthCheck
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HealthCheckResponse'
    /uba/v1/report:
        post:
            tags:
                - ReportService
            description: 提交事件（单条/批量）
            operationId: ReportService_PostReport
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/PostReportRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PostReportResponse'
