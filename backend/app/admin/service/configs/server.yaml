server:
  rest:
    addr: "0.0.0.0:5600"
    timeout: 10s
    enable_swagger: true
    cors:
      headers:
        - "X-Requested-With"
        - "X-Request-ID"
        - "Content-Type"
        - "Authorization"
      methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "HEAD"
        - "OPTIONS"
      origins:
        - "*"
    middleware:
      auth:
        method: "HS256"
        key: "some_api_key"

  sse:
    addr: ":5601"
    codec: "json"
    path: "/events"
    auto_stream: true
    auto_reply: false
